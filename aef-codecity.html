const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(30, 25, 50);

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(30, 0, 5);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(50, 50, 30);
sun.castShadow = true;
scene.add(sun);

// Ground
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 60),
    new THREE.MeshStandardMaterial({color: 0x151525})
);
ground.rotation.x = -Math.PI/2;
ground.position.set(50, -0.01, 10);
ground.receiveShadow = true;
scene.add(ground);

// Buildings
const buildingMeshes = [];
data.buildings.forEach(b => {
    const geo = new THREE.BoxGeometry(b.width, b.height, b.width);
    const mat = new THREE.MeshStandardMaterial({
        color: b.color,
        metalness: 0.3,
        roughness: 0.7
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(b.x, b.height/2, b.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = b;
    scene.add(mesh);
    buildingMeshes.push(mesh);
});

// District labels
const districtDiv = document.getElementById("districts");
data.districts.forEach(([name, x]) => {
    const label = document.createElement("div");
    label.className = "district-label";
    label.textContent = name;
    label.onclick = () => {
        camera.position.set(x + 5, 15, 20);
        controls.target.set(x + 5, 0, 5);
    };
    districtDiv.appendChild(label);
});

// Tooltip
const tooltip = document.getElementById("tooltip");
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.onmousemove = e => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(buildingMeshes);
    if (hits.length) {
        const b = hits[0].object.userData;
        tooltip.style.display = "block";
        tooltip.style.left = e.clientX + 15 + "px";
        tooltip.style.top = e.clientY + 15 + "px";
        tooltip.innerHTML = `
            <div style="font-weight:bold;color:#22cc88;margin-bottom:6px">${b.label}</div>
            <div>District: ${b.district}</div>
            <div>Cyclomatic: <b>${b.metrics.cyclomatic}</b></div>
            <div>Cognitive: ${b.metrics.cognitive}</div>
            <div>Functions: ${b.metrics.functions}</div>
            <div>Health: ${(b.metrics.health * 100).toFixed(0)}%</div>
            <div style="font-size:10px;color:#666;margin-top:6px">${b.id}</div>
        `;
    } else {
        tooltip.style.display = "none";
    }
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
};
</script>
