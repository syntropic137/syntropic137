# Base Docker Compose - Shared service definitions
# Usage: docker compose -f docker-compose.yaml -f docker-compose.{dev,test}.yaml up
#
# This file contains service images, builds, env vars, health checks, dependencies.
# NO ports, NO volumes, NO container_name (those go in override files).
#
# See: ADR-034 - Test Infrastructure Architecture

name: ${COMPOSE_PROJECT_NAME:-aef}

services:
  # =============================================================================
  # UNIFIED DATABASE - TimescaleDB (ADR-030)
  # =============================================================================
  # Single database instance for all AEF data:
  # - Domain events (event_store.events) - hypertable for append-only workloads
  # - Observability events (public.agent_events) - hypertable for time-series
  # - Workflow definitions, artifacts, projections
  #
  # TimescaleDB provides 10x-100x better performance for append-only event stores
  # =============================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: aef
      POSTGRES_USER: aef
      POSTGRES_PASSWORD: aef_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aef -d aef"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # EVENT STORE - gRPC Event Sourcing Server
  # =============================================================================
  event-store:
    build:
      context: ../lib/event-sourcing-platform
      dockerfile: event-store/Dockerfile
    environment:
      BACKEND: postgres
      DATABASE_URL: postgres://aef:aef_dev_password@timescaledb:5432/aef
      BIND_ADDR: 0.0.0.0:50051
      RUST_LOG: info
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # COLLECTOR - Agent Event Ingestion Service
  # =============================================================================
  collector:
    build:
      context: ..
      dockerfile: packages/aef-collector/Dockerfile
    environment:
      EVENT_COLLECTOR_PORT: "8080"
      EVENTSTORE_HOST: event-store
      EVENTSTORE_PORT: "50051"
      EVENT_BATCH_SIZE: "100"
      EVENT_BATCH_INTERVAL_MS: "1000"
    depends_on:
      event-store:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import http.client; c=http.client.HTTPConnection(''localhost'',8080); c.request(''GET'',''/health''); exit(0 if c.getresponse().status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================================
  # MINIO - S3-compatible Object Storage
  # =============================================================================
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/aef-artifacts &&
      echo 'Bucket aef-artifacts ready!'
      "
    restart: "no"

  # =============================================================================
  # REDIS - Caching and Pub/Sub
  # =============================================================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # SIDECAR PROXY - Agent Container Network Proxy (Optional)
  # =============================================================================
  # Example sidecar proxy for agent containers
  # This is a template - actual sidecars are deployed per-execution
  sidecar-proxy:
    build:
      context: ./sidecar-proxy
      dockerfile: Dockerfile
    environment:
      AEF_EXECUTION_ID: "dev-local"
    profiles:
      - sidecar # Only start with: docker compose --profile sidecar up
