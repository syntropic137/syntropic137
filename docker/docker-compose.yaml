# Base Docker Compose - Shared service definitions
# Usage: docker compose -f docker-compose.yaml -f docker-compose.{dev,test,selfhost,ondemand}.yaml up
#
# This file contains service images, builds, env vars, health checks, dependencies.
# NO ports, NO volumes, NO container_name (those go in override files).
#
# See: ADR-034 - Test Infrastructure Architecture
# See: ADR-060 - On-Demand Environment Creation

name: syntropic137_${APP_ENVIRONMENT:-development}

services:
  # =============================================================================
  # UNIFIED DATABASE - TimescaleDB (ADR-030)
  # =============================================================================
  # Single database instance for all Syn137 data:
  # - Domain events (event_store.events) - hypertable for append-only workloads
  # - Observability events (public.agent_events) - hypertable for time-series
  # - Workflow definitions, artifacts, projections
  #
  # TimescaleDB provides 10x-100x better performance for append-only event stores
  # =============================================================================
  timescaledb:
    image: timescale/timescaledb:2.25.1-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syn}
      POSTGRES_USER: ${POSTGRES_USER:-syn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syn_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syn} -d ${POSTGRES_DB:-syn}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # EVENT STORE - gRPC Event Sourcing Server
  # =============================================================================
  event-store:
    build:
      context: ../lib/event-sourcing-platform
      dockerfile: event-store/Dockerfile
    environment:
      BACKEND: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      BIND_ADDR: 0.0.0.0:50051
      RUST_LOG: info
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # COLLECTOR - Agent Event Ingestion Service
  # =============================================================================
  collector:
    build:
      context: ..
      dockerfile: packages/syn-collector/Dockerfile
    networks:
      - default
      - agent-net  # Workspace containers push OTLP metrics here (receive-only, no secrets)
    environment:
      EVENT_COLLECTOR_PORT: "8080"
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_BATCH_SIZE: "100"
      EVENT_BATCH_INTERVAL_MS: "1000"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import http.client; c=http.client.HTTPConnection(''localhost'',8080); c.request(''GET'',''/health''); exit(0 if c.getresponse().status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================================
  # DOCKER SOCKET PROXY (ISS-164)
  # =============================================================================
  # Restricts API to only the Docker API endpoints it needs for workspace mgmt.
  # The real socket is mounted ONLY here - API talks to this proxy via TCP.
  # Override files add: container_name, restart policy, resource limits.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1     # Allow /containers/* path prefix (inspect, list, rm)
      ALLOW_START: 1    # docker start -> POST /containers/{id}/start
      ALLOW_STOP: 1     # docker stop  -> POST /containers/{id}/stop
      EXEC: 1           # docker exec  -> /exec/* paths
      POST: 1           # Enable all non-GET verbs (POST, DELETE, PUT)
      NETWORKS: 1       # ADR-021: agentic_isolation provisioning creates/inspects agent-net
      INFO: 1           # agentic_isolation probes engine capabilities via /info
      IMAGES: 1         # #720 / ADR-024 (2026-05-01): allow `docker run` to auto-pull missing
                        # workspace images. Without this every selfhost user hits 403 Forbidden
                        # on first workflow run because POST /images/create is blocked.
                        # Trade-off documented in ADR-024 amendment.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
    networks:
      - docker-proxy

  # =============================================================================
  # API - Query and Control Service
  # =============================================================================
  api:
    build:
      context: ..
      dockerfile: infra/docker/images/syn-api/Dockerfile
    environment:
      SYN_API_PORT: "8000"
      SYN_API_HOST: "0.0.0.0"
      # ADR-030: Use explicit database URLs
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_STORE_HOST: event-store
      EVENT_STORE_PORT: "50051"
      REDIS_URL: redis://redis:6379/0
      # Docker socket proxy (ISS-164) - all stacks use the same proxy
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # Note: secrets (GitHub App, Anthropic, storage) are injected via
      # overlay files (dev, selfhost, ondemand) using env_file or environment
    depends_on:
      timescaledb:
        condition: service_healthy
      event-store:
        condition: service_healthy
      collector:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import http.client; c=http.client.HTTPConnection(''localhost'',8000); c.request(''GET'',''/health''); exit(0 if c.getresponse().status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
      - docker-proxy

  # =============================================================================
  # MINIO - S3-compatible Object Storage
  # =============================================================================
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # =============================================================================
  # REDIS - Caching and Pub/Sub
  # =============================================================================
  redis:
    image: redis:7.2.5-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # ENVOY PROXY - Shared Credential Injection Proxy (ISS-43)
  # =============================================================================
  # Shared Envoy proxy that routes agent traffic. Credential injection is
  # handled by the token-injector service via ext_authz (port 9002).
  # Agents never see real API keys — only "proxy-managed" placeholder.
  #
  # Architecture:
  #   Agent (agent-net only) → envoy-proxy → token-injector (ext_authz) → external APIs
  envoy-proxy:
    build:
      context: ./sidecar-proxy
      dockerfile: Dockerfile
    networks:
      - default
      - agent-net
    depends_on:
      token-injector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9901/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # =============================================================================
  # TOKEN INJECTOR - ext_authz gRPC service (ISS-43)
  # =============================================================================
  # Implements Envoy's ext_authz protocol. Receives auth check requests from
  # Envoy, looks up credentials from its own environment, and returns the real
  # headers to inject. Credentials live ONLY here — not in agent containers.
  token-injector:
    build:
      context: ./token-injector
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    networks:
      - default

networks:
  docker-proxy:
    # Isolated bridge for docker-socket-proxy <-> API communication only.
    # No other services should be on this network.
    internal: true
  agent-net:
    # Not internal: agents need egress for git operations (clone/push to github.com).
    # API key security is enforced via ANTHROPIC_BASE_URL routing to the proxy -
    # agents only hold a "proxy-managed" placeholder, so direct api.anthropic.com
    # calls fail. Full network isolation (internal: true) deferred to Phase 2
    # when git traffic is also routed through the proxy via CONNECT tunneling.
