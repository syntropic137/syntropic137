# Base Docker Compose - Shared service definitions
# Usage: docker compose -f docker-compose.yaml -f docker-compose.{dev,test}.yaml up
#
# This file contains service images, builds, env vars, health checks, dependencies.
# NO ports, NO volumes, NO container_name (those go in override files).
#
# See: ADR-034 - Test Infrastructure Architecture

name: syntropic137_${APP_ENVIRONMENT:-development}

services:
  # =============================================================================
  # UNIFIED DATABASE - TimescaleDB (ADR-030)
  # =============================================================================
  # Single database instance for all Syn137 data:
  # - Domain events (event_store.events) - hypertable for append-only workloads
  # - Observability events (public.agent_events) - hypertable for time-series
  # - Workflow definitions, artifacts, projections
  #
  # TimescaleDB provides 10x-100x better performance for append-only event stores
  # =============================================================================
  timescaledb:
    image: timescale/timescaledb:2.25.1-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syn}
      POSTGRES_USER: ${POSTGRES_USER:-syn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syn_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syn} -d ${POSTGRES_DB:-syn}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # EVENT STORE - gRPC Event Sourcing Server
  # =============================================================================
  event-store:
    build:
      context: ../lib/event-sourcing-platform
      dockerfile: event-store/Dockerfile
    environment:
      BACKEND: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      BIND_ADDR: 0.0.0.0:50051
      RUST_LOG: info
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # COLLECTOR - Agent Event Ingestion Service
  # =============================================================================
  collector:
    build:
      context: ..
      dockerfile: packages/syn-collector/Dockerfile
    environment:
      EVENT_COLLECTOR_PORT: "8080"
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_BATCH_SIZE: "100"
      EVENT_BATCH_INTERVAL_MS: "1000"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import http.client; c=http.client.HTTPConnection(''localhost'',8080); c.request(''GET'',''/health''); exit(0 if c.getresponse().status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================================
  # API - Query and Control Service
  # =============================================================================
  api:
    build:
      context: ..
      dockerfile: infra/docker/images/syn-api/Dockerfile
    environment:
      SYN_API_PORT: "8000"
      SYN_API_HOST: "0.0.0.0"
      # ADR-030: Use explicit database URLs
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_STORE_HOST: event-store
      EVENT_STORE_PORT: "50051"
      REDIS_URL: redis://redis:6379/0
      # Note: secrets (GitHub App, Anthropic, storage) are injected via the
      # dev overlay (docker-compose.dev.yaml) using env_file: ../.env
    depends_on:
      timescaledb:
        condition: service_healthy
      event-store:
        condition: service_healthy
      collector:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import http.client; c=http.client.HTTPConnection(''localhost'',8000); c.request(''GET'',''/health''); exit(0 if c.getresponse().status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =============================================================================
  # MINIO - S3-compatible Object Storage
  # =============================================================================
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create default buckets on startup
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/syn-artifacts &&
      mc mb --ignore-existing local/syn-conversations &&
      echo 'Buckets ready!'
      "
    restart: "no"

  # =============================================================================
  # REDIS - Caching and Pub/Sub
  # =============================================================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # ENVOY PROXY - Shared Credential Injection Proxy (ISS-43)
  # =============================================================================
  # Shared Envoy proxy that routes agent traffic. Credential injection is
  # handled by the token-injector service via ext_authz (port 9002).
  # Agents never see real API keys — only "proxy-managed" placeholder.
  #
  # Architecture:
  #   Agent (agent-net only) → envoy-proxy → token-injector (ext_authz) → external APIs
  envoy-proxy:
    build:
      context: ./sidecar-proxy
      dockerfile: Dockerfile
    networks:
      - default
      - agent-net
    depends_on:
      token-injector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9901/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # =============================================================================
  # TOKEN INJECTOR - ext_authz gRPC service (ISS-43)
  # =============================================================================
  # Implements Envoy's ext_authz protocol. Receives auth check requests from
  # Envoy, looks up credentials from its own environment, and returns the real
  # headers to inject. Credentials live ONLY here — not in agent containers.
  token-injector:
    build:
      context: ./token-injector
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      SYN_GITHUB_PRIVATE_KEY: ${SYN_GITHUB_PRIVATE_KEY:-}
    networks:
      - default

networks:
  agent-net:
    internal: true  # No external egress — agents can only reach the proxy
