# Cloudflare Tunnel Docker Compose - Overlay for secure external access
# Usage: docker compose -f docker-compose.yaml -f docker-compose.selfhost.yaml -f docker-compose.cloudflare.yaml up -d
# Shortcut: just selfhost-up-tunnel
#
# Adds Cloudflare Tunnel and removes direct port exposure on gateway.
# Prerequisites:
#   1. Set CLOUDFLARE_TUNNEL_TOKEN in infra/.env (or resolve via 1Password)
#   2. Set SYN_DOMAIN in infra/.env
#   3. Configure tunnel routes in Cloudflare Zero Trust dashboard

services:
  # ===========================================================================
  # CLOUDFLARE TUNNEL
  # ===========================================================================
  # Provides secure, zero-trust access without port forwarding.
  # See: infra/cloudflare/README.md for setup instructions.
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: syn137-cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    depends_on:
      gateway:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - syn-internal

  # ===========================================================================
  # IMPORTANT: In Cloudflare Zero Trust dashboard, set the tunnel's public
  # hostname service URL to:  http://gateway:8081
  #
  # Port 8081 = basic auth required (when SYN_API_PASSWORD is set)
  # Port 80   = localhost only, no auth (for local dev/testing/Playwright)
  #
  # If your tunnel still points to gateway:80, the UI/API is exposed without
  # authentication. Update it now:
  #   Zero Trust → Networks → Connectors → [your tunnel] → Public Hostname
  # ===========================================================================
