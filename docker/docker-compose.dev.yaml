# Development Docker Compose - Overrides for local development
# Usage: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
# Shortcut: just dev
#
# Adds: container names, ports, persistent volumes, restart policies
# See: ADR-034 - Test Infrastructure Architecture
#
# Project name "syn-dev" avoids clashing with the selfhost stack ("syntropic137").
name: syn-dev

services:
  timescaledb:
    container_name: syn-db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  event-store:
    container_name: syn-event-store
    ports:
      - "50051:50051"
    restart: unless-stopped

  collector:
    container_name: syn-collector
    ports:
      - "8080:8080"
    restart: unless-stopped

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.4.2
    container_name: syn-docker-socket-proxy
    environment:
      CONTAINERS: 1     # Allow /containers/* path prefix (inspect, list, rm)
      ALLOW_START: 1    # docker start → POST /containers/{id}/start
      ALLOW_STOP: 1     # docker stop  → POST /containers/{id}/stop
      EXEC: 1           # docker exec  → /exec/* paths
      POST: 1           # Enable all non-GET verbs (POST, DELETE, PUT)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
    networks:
      - default

  api:
    container_name: syn-api
    build:
      args:
        INCLUDE_DOCKER_CLI: "1"
    ports:
      - "8137:8000"
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/selfhost-entrypoint.sh"]
    command: ["sh", "-c", "uvicorn syn_api.main:app --host $${SYN_API_HOST:-0.0.0.0} --port $${SYN_API_PORT:-8000}"]
    env_file:
      - ../.env # Load environment variables from root .env file
    environment:
      # Override .env localhost values with Docker service names (ADR-030)
      SYN_OBSERVABILITY_DB_URL: postgres://syn:syn_dev_password@timescaledb:5432/syn
      EVENT_STORE_HOST: event-store
      EVENT_STORE_PORT: "50051"
      # MinIO storage for artifacts (ADR default is 'local' which isn't implemented)
      SYN_STORAGE_PROVIDER: minio
      SYN_STORAGE_MINIO_ENDPOINT: minio:9000
      SYN_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SYN_STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # 1Password-managed secrets: shell env (from resolve_env.sh) overrides env_file
      SYN_GITHUB_APP_ID: ${SYN_GITHUB_APP_ID:-}
      SYN_GITHUB_APP_NAME: ${SYN_GITHUB_APP_NAME:-}
      SYN_GITHUB_PRIVATE_KEY: ${SYN_GITHUB_PRIVATE_KEY:-}
      SYN_GITHUB_WEBHOOK_SECRET: ${SYN_GITHUB_WEBHOOK_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Workspace directory configuration for Docker-in-Docker
      # Container path where workspaces are accessible
      SYN_WORKSPACE_CONTAINER_DIR: /workspaces
      # Host path that Docker daemon can mount (must match volume mount below).
      # ../workspaces resolves to the repo root workspaces/ dir, which is what
      # the API container has mounted at /workspaces via the volume below.
      SYN_WORKSPACE_HOST_DIR: ${PWD}/workspaces
      # Agent network: matches the compose-prefixed name for this stack (syn-dev_agent-net).
      # Each compose stack gets its own prefix, preventing cross-stack container leakage.
      # Production override: SYN_AGENT_NETWORK=syntropic137_agent-net (or whatever that stack's prefix is)
      SYN_AGENT_NETWORK: syn-dev_agent-net
      # Docker socket proxy (ISS-164)
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    depends_on:
      docker-socket-proxy:
        condition: service_started
    volumes:
      - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
      # Mount workspace directory for container file sharing
      # Host path (${PWD}/workspaces) -> Container path (/workspaces)
      - ../workspaces:/workspaces

  minio:
    container_name: syn-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    container_name: syn-minio-init
    profiles: ["init"]

  redis:
    container_name: syn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  envoy-proxy:
    container_name: syn-envoy-proxy
    ports:
      - "8081:8081"
      - "9901:9901" # Envoy admin
    restart: unless-stopped

  token-injector:
    container_name: syn-token-injector
    restart: unless-stopped

volumes:
  db_data:
  minio_data:
  redis_data:

networks:
  default:
    name: syn-dev-network
