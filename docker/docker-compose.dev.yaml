# Development Docker Compose - Overrides for local development
# Usage: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
# Shortcut: just dev
#
# Adds: container names, ports, persistent volumes, restart policies
# See: ADR-034 - Test Infrastructure Architecture

services:
  timescaledb:
    container_name: aef-db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  event-store:
    container_name: aef-event-store
    ports:
      - "50051:50051"
    restart: unless-stopped

  collector:
    container_name: aef-collector
    ports:
      - "8080:8080"
    restart: unless-stopped

  dashboard:
    container_name: aef-dashboard
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - ../.env # Load environment variables from root .env file
    environment:
      # Override .env localhost values with Docker service names (ADR-030)
      AEF_OBSERVABILITY_DB_URL: postgres://aef:aef_dev_password@timescaledb:5432/aef
      EVENT_STORE_HOST: event-store
      EVENT_STORE_PORT: "50051"
      # Override MinIO endpoint for Docker network
      AEF_STORAGE_MINIO_ENDPOINT: minio:9000
      # Workspace directory configuration for Docker-in-Docker
      # Container path where workspaces are accessible
      AEF_WORKSPACE_CONTAINER_DIR: /workspaces
      # Host path that Docker daemon can mount (must match volume mount below)
      # This should be absolute path on the host machine
      AEF_WORKSPACE_HOST_DIR: ${PWD}/workspaces
    volumes:
      # Mount Docker socket to create workspace containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount workspace directory for container file sharing
      # Host path (${PWD}/workspaces) -> Container path (/workspaces)
      - ../workspaces:/workspaces

  minio:
    container_name: aef-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    container_name: aef-minio-init

  redis:
    container_name: aef-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  sidecar-proxy:
    container_name: aef-sidecar-example
    ports:
      - "8081:8081"
      - "9901:9901" # Envoy admin
    restart: unless-stopped

volumes:
  db_data:
  minio_data:
  redis_data:

networks:
  default:
    name: aef-network
