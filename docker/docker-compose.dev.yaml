# Development Docker Compose
# Start with: just dev

name: aef

services:
  postgres:
    image: postgres:16-alpine
    container_name: aef-postgres
    environment:
      POSTGRES_USER: aef
      POSTGRES_PASSWORD: aef_dev_password
      POSTGRES_DB: aef
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aef -d aef"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  event-store:
    build:
      context: ../lib/event-sourcing-platform
      dockerfile: event-store/Dockerfile
    container_name: aef-event-store
    environment:
      BACKEND: postgres
      DATABASE_URL: postgres://aef:aef_dev_password@postgres:5432/aef
      BIND_ADDR: 0.0.0.0:50051
      RUST_LOG: info
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  collector:
    build:
      context: ../packages/aef-collector
      dockerfile: Dockerfile
    container_name: aef-collector
    environment:
      EVENT_COLLECTOR_PORT: "8080"
      EVENTSTORE_HOST: event-store
      EVENTSTORE_PORT: "50051"
      EVENT_BATCH_SIZE: "100"
      EVENT_BATCH_INTERVAL_MS: "1000"
    ports:
      - "8080:8080"
    depends_on:
      event-store:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: aef-network
