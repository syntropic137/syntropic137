# Development Docker Compose - Overrides for local development
# Usage: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
# Shortcut: just dev
#
# Adds: container names, ports, persistent volumes, restart policies
# See: ADR-034 - Test Infrastructure Architecture

services:
  timescaledb:
    container_name: aef-db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  event-store:
    container_name: aef-event-store
    ports:
      - "50051:50051"
    restart: unless-stopped

  collector:
    container_name: aef-collector
    ports:
      - "8080:8080"
    restart: unless-stopped

  minio:
    container_name: aef-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    container_name: aef-minio-init

  redis:
    container_name: aef-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  sidecar-proxy:
    container_name: aef-sidecar-example
    ports:
      - "8081:8081"
      - "9901:9901" # Envoy admin
    restart: unless-stopped

volumes:
  db_data:
  minio_data:
  redis_data:

networks:
  default:
    name: aef-network
