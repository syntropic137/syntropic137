version: "3.8"

services:
  timescale-test:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: obs_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d obs_test"]
      interval: 2s
      timeout: 5s
      retries: 5

  test-runner:
    image: python:3.12-slim
    depends_on:
      timescale-test:
        condition: service_healthy
    volumes:
      - ./test-observability:/app
    working_dir: /app
    command: tail -f /dev/null # Keep container running for manual testing
    environment:
      DATABASE_URL: postgresql://test:test@timescale-test:5432/obs_test
