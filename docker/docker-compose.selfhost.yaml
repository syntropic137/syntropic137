# Self-Host Docker Compose - Production overlay for self-hosted deployments
# Usage: docker compose -f docker-compose.yaml -f docker-compose.selfhost.yaml up -d
# Shortcut: just selfhost-up
#
# Adds: container names, persistent volumes, secrets, resource limits,
#        restart policies, log rotation, gateway frontend, syn-internal network.
#
# Replaces the former infra/docker/compose/docker-compose.yaml and
# docker-compose.homelab.yaml files (consolidated per ADR-034).

services:
  # ===========================================================================
  # DATABASE
  # ===========================================================================
  timescaledb:
    container_name: syn137-timescaledb
    environment:
      # Clear POSTGRES_PASSWORD from base compose — _FILE variant is exclusive
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    tmpfs:
      - /tmp
      - /run
      - /var/run/postgresql
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1g}
          cpus: "${POSTGRES_CPU_LIMIT:-1.0}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - syn-internal

  # ===========================================================================
  # EVENT STORE
  # ===========================================================================
  event-store:
    container_name: syn137-event-store
    volumes:
      - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/selfhost-entrypoint.sh"]
    command: ["/usr/local/bin/eventstore"]
    secrets:
      - db_password
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${EVENT_STORE_MEMORY_LIMIT:-512m}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # COLLECTOR
  # ===========================================================================
  collector:
    container_name: syn137-collector
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${COLLECTOR_MEMORY_LIMIT:-256m}
          cpus: "${COLLECTOR_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # DOCKER SOCKET PROXY (ISS-164)
  # ===========================================================================
  # Restricts api to only the Docker API endpoints it actually uses.
  # The real socket is mounted ONLY here — api talks to this proxy via TCP.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: syn137-docker-socket-proxy
    environment:
      CONTAINERS: 1     # Allow /containers/* path prefix (inspect, list, rm)
      ALLOW_START: 1    # docker start → POST /containers/{id}/start
      ALLOW_STOP: 1     # docker stop  → POST /containers/{id}/stop
      EXEC: 1           # docker exec  → /exec/* paths
      POST: 1           # Enable all non-GET verbs (POST, DELETE, PUT)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # API
  # ===========================================================================
  api:
    container_name: syn137-api
    build:
      args:
        INCLUDE_OP_CLI: "${INCLUDE_OP_CLI:-0}"
        INCLUDE_DOCKER_CLI: "1"
    volumes:
      - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
      - api_logs:/app/logs
      - ../workspaces:/workspaces
    entrypoint: ["/bin/sh", "/selfhost-entrypoint.sh"]
    command: ["sh", "-c", "uvicorn syn_api.main:app --host $$SYN_API_HOST --port $$SYN_API_PORT --root-path /api/v1"]
    environment:
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SYN_GITHUB_APP_ID=${SYN_GITHUB_APP_ID:-}
      - SYN_GITHUB_APP_NAME=${SYN_GITHUB_APP_NAME:-}
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-production}
      # 1Password (optional)
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN:-}
      # MinIO (artifact storage)
      - SYN_STORAGE_PROVIDER=minio
      - SYN_STORAGE_MINIO_ENDPOINT=minio:9000
      - SYN_STORAGE_MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - SYN_STORAGE_MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - SYN_STORAGE_MINIO_SECURE=false
      # Crown-jewel secrets: injected as env vars (1Password or .env), never as files
      - SYN_GITHUB_PRIVATE_KEY=${SYN_GITHUB_PRIVATE_KEY:-}
      - SYN_GITHUB_WEBHOOK_SECRET=${SYN_GITHUB_WEBHOOK_SECRET:-}
      # Agent credentials (for workspace containers)
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Workspace configuration
      - SYN_WORKSPACE_CONTAINER_DIR=/workspaces
      - SYN_WORKSPACE_HOST_DIR=${PWD}/workspaces
      # Docker socket proxy (ISS-164)
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - SYN_AGENT_NETWORK=syntropic137_${APP_ENVIRONMENT:-production}_agent-net
    depends_on:
      docker-socket-proxy:
        condition: service_started
    secrets:
      - db_password
      - redis_password
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /home/syn/.config  # 1Password CLI needs writable config dir on read-only FS
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512m}
          cpus: "${API_CPU_LIMIT:-0.5}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # FRONTEND (nginx)
  # ===========================================================================
  gateway:
    build:
      context: ..
      dockerfile: infra/docker/images/gateway/Dockerfile
    container_name: syn137-gateway
    ports:
      - "127.0.0.1:${SYN_GATEWAY_PORT:-8008}:80"
    environment:
      # Optional basic auth — protects UI and API, webhooks bypass.
      # Set SYN_API_PASSWORD to enable. Omit for no auth (local-only or Cloudflare Access).
      - SYN_API_PASSWORD=${SYN_API_PASSWORD:-}
      - SYN_API_USER=${SYN_API_USER:-admin}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    deploy:
      resources:
        limits:
          memory: ${UI_MEMORY_LIMIT:-256m}
          cpus: "${UI_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # MINIO
  # ===========================================================================
  minio:
    container_name: syn137-minio
    volumes:
      - minio_data:/data
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEMORY_LIMIT:-256m}
          cpus: "${MINIO_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  minio-init:
    container_name: syn137-minio-init
    profiles: ["init"]
    networks:
      - syn-internal

  # ===========================================================================
  # REDIS
  # ===========================================================================
  redis:
    container_name: syn137-redis
    # Read password from Docker secret, then exec redis-server as redis user
    user: "999:999"
    entrypoint: ["sh", "-c", "exec redis-server --dir /data --appendonly yes --requirepass \"$(cat /run/secrets/redis_password)\""]
    command: []
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-256m}
          cpus: "${REDIS_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

# =============================================================================
# SECRETS (file-based)
# =============================================================================
secrets:
  db_password:
    file: ../infra/docker/secrets/db-password.txt
  redis_password:
    file: ../infra/docker/secrets/redis-password.txt

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  db_data:
    name: syn137_db_data
  api_logs:
    name: syn137_api_logs
  minio_data:
    name: syn137_minio_data
  redis_data:
    name: syn137_redis_data

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  syn-internal:
    name: syn137_internal
    driver: bridge
