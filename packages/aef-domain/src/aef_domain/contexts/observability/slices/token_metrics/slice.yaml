name: token_metrics
description: Token usage metrics for sessions
context: observability
type: query

# Events this slice subscribes to (Pattern 2: observations)
subscribes_to:
  - token_usage

# Query this slice handles
query:
  name: GetTokenMetricsQuery
  returns: SessionTokenMetrics

# Read model this slice produces
read_model: SessionTokenMetrics

# Projection that builds the read model
projection: TokenMetricsProjection
