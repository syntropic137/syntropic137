# Workspace Metrics Slice
#
# Builds workspace performance metrics from lifecycle events.
# Used for observability dashboards and performance monitoring.

name: workspace_metrics
description: Workspace lifecycle and performance metrics

# Events this slice subscribes to
events:
  - WorkspaceCreating
  - WorkspaceCreated
  - WorkspaceCommandExecuted
  - WorkspaceDestroying
  - WorkspaceDestroyed
  - WorkspaceError

# Queries this slice handles
queries:
  - GetWorkspaceMetricsQuery

# Read models produced
read_models:
  - WorkspaceMetrics
  - WorkspaceMetricsSummary
