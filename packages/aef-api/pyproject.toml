[project]
name = "aef-api"
version = "0.1.0"
description = "Programmatic API for the Agentic Engineering Framework"
requires-python = ">=3.12"
dependencies = [
    "aef-domain",
    "aef-adapters",
    "aef-shared",
    "pydantic>=2.12.5",
]

[build-system]
requires = ["uv_build>=0.9.13"]
build-backend = "uv_build"
