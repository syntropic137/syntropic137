[project]
name = "aef-adapters"
version = "0.1.0"
description = "External integrations for Agentic Engineering Framework"
requires-python = ">=3.12"

dependencies = [
    "aef-shared",
    "aef-domain",
    "agentic-hooks",  # Hook event types and client
]

[project.optional-dependencies]
postgres = [
    "asyncpg>=0.30.0",
]
# Legacy chat completion adapter (direct Anthropic API)
claude = [
    "anthropic>=0.42.0",
]
# Agentic SDK adapter (recommended)
claude-agentic = [
    "claude-agent-sdk>=0.1.9",
]
openai = [
    "openai>=1.59.0",
]
# Install all agent adapters (legacy chat completion style)
agents = [
    "anthropic>=0.42.0",
    "openai>=1.59.0",
]
# Install all agentic SDK adapters (recommended for new code)
agentic = [
    "claude-agent-sdk>=0.1.9",
]
# Install everything
all = [
    "asyncpg>=0.30.0",
    "anthropic>=0.42.0",
    "openai>=1.59.0",
    "claude-agent-sdk>=0.1.9",
]

[build-system]
requires = ["uv_build>=0.9.13"]
build-backend = "uv_build"
