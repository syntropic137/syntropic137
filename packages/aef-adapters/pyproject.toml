[project]
name = "aef-adapters"
version = "0.1.0"
description = "External integrations for Agentic Engineering Framework"
requires-python = ">=3.12"

dependencies = [
    "aef-shared",
    "aef-domain",
    "aef-tokens",  # Token vending service (ADR-022)
    "agentic-logging",  # Structured logging (ADR-014 from agentic-primitives)
    "agentic-events",  # Simple event emission (ADR-029)
    "event-sourcing-python[grpc]", # Event Store SDK (ADR-007)
    "anthropic>=0.75.0",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
postgres = [
    "asyncpg>=0.30.0",
]
# Chat completion adapter (direct Anthropic API)
claude = [
    "anthropic>=0.42.0",
]
openai = [
    "openai>=1.59.0",
]
# Install all chat completion agent adapters
agents = [
    "anthropic>=0.42.0",
    "openai>=1.59.0",
]
# MinIO storage adapter
minio = [
    "minio>=7.2.0",
]
# Install everything
all = [
    "asyncpg>=0.30.0",
    "anthropic>=0.42.0",
    "openai>=1.59.0",
    "minio>=7.2.0",
]

[build-system]
requires = ["uv_build>=0.9.13"]
build-backend = "uv_build"
