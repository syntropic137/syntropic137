[project]
name = "aef-adapters"
version = "0.1.0"
description = "External integrations for Agentic Engineering Framework"
requires-python = ">=3.12"

dependencies = [
    "aef-shared",
    "aef-domain",
    "agentic-hooks[http]",
    "event-sourcing-python[grpc]", # Event Store SDK (ADR-007)
    "anthropic>=0.75.0",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
postgres = [
    "asyncpg>=0.30.0",
]
claude = [
    "anthropic>=0.42.0",
]
openai = [
    "openai>=1.59.0",
]
# Install all agent adapters
agents = [
    "anthropic>=0.42.0",
    "openai>=1.59.0",
]
# Install everything
all = [
    "asyncpg>=0.30.0",
    "anthropic>=0.42.0",
    "openai>=1.59.0",
]

[build-system]
requires = ["uv_build>=0.9.13"]
build-backend = "uv_build"
