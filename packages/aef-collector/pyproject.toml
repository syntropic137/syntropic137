[project]
name = "aef-collector"
version = "0.1.0"
description = "Event collection service for AEF agent observability"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "AgentParadise" }]
keywords = ["ai", "agents", "event-sourcing", "observability", "metrics"]

dependencies = [
    "click>=8.0",
    "httpx>=0.27",
    "fastapi>=0.115",
    "uvicorn>=0.32",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "watchfiles>=0.24",
    "aef-shared",
    "event-sourcing-python",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov",
]

[project.scripts]
aef-collector = "aef_collector.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aef_collector"]
