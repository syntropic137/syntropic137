[project]
name = "syn-shared"
version = "0.17.0"
description = "Shared utilities for Syntropic137"
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.12.5",
    "pydantic-settings>=2.7.0",
    "structlog>=25.4.0",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["uv_build>=0.9.13"]
build-backend = "uv_build"
