[project]
name = "syn-api"
version = "0.1.0"
description = "Programmatic API for the Syntropic137"
requires-python = ">=3.12"
dependencies = [
    "syn-domain",
    "syn-adapters",
    "syn-shared",
    "pydantic>=2.12.5",
]

[build-system]
requires = ["uv_build>=0.9.13"]
build-backend = "uv_build"
