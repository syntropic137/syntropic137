[project]
name = "agentic-engineering-framework"
version = "0.1.0"
description = "Event-sourced system for tracking AI agent work across workflows"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "AgentParadise" }]
keywords = ["ai", "agents", "event-sourcing", "workflows", "metrics"]

# Workspace member dependencies
dependencies = [
    "aef-cli",
    "aef-domain",
    "aef-adapters",
    "aef-shared",
]

[dependency-groups]
dev = [
    "ruff>=0.14.7",
    "mypy>=1.19.0",
    "pytest>=9.0.1",
    "pytest-cov>=7.0.0",
    "pytest-asyncio>=1.3.0",
]

[build-system]
requires = ["uv_build>=0.9.13"]
build-backend = "uv_build"

[tool.uv.workspace]
members = ["apps/*", "packages/*"]

[tool.uv.sources]
aef-cli = { workspace = true }
aef-domain = { workspace = true }
aef-adapters = { workspace = true }
aef-shared = { workspace = true }

# Submodule dependencies (uncomment when ready)
# agentic-primitives = { path = "lib/agentic-primitives/lib/python" }
# event-sourcing-python = { path = "lib/event-sourcing-platform/event-sourcing/python" }

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["apps/*/src", "packages/*/src"]
exclude = [
    "lib/",
    ".venv/",
    "__pycache__/",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "RUF",    # Ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
]

[tool.ruff.lint.isort]
known-first-party = ["aef_cli", "aef_domain", "aef_adapters", "aef_shared"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true
show_column_numbers = true
pretty = true
# Exclude test directories from strict type checking
exclude = ["^.*/tests/.*$"]

[tool.pytest.ini_options]
testpaths = [
    "apps/aef-cli/tests",
    "packages/aef-domain/tests",
    "packages/aef-adapters/tests",
    "packages/aef-shared/tests",
]
pythonpath = [
    "apps/aef-cli/src",
    "packages/aef-domain/src",
    "packages/aef-adapters/src",
    "packages/aef-shared/src",
]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = ["-ra", "-q", "--strict-markers"]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (may use Docker services)",
    "e2e: End-to-end tests (full system)",
]

[tool.coverage.run]
branch = true
source = ["apps", "packages"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
