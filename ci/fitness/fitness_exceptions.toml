# Fitness exception registries and grandfathered violations.
# See ADR-062 (docs/adrs/ADR-062-architectural-fitness-function-standard.md)
# and FITNESS-MANIFEST.md for the principle-to-test mapping.
#
# Grandfathered violations for REMAINING Python-based fitness checks.
# See: docs/adrs/ADR-062-cross-context-public-api-enforcement.md
# Cognitive complexity and file size checks migrated to APSS fitness.toml.
# This file only tracks structural & ES invariant exceptions.
#
# Budgets are set to exact current violation counts.
# Adding new code that exceeds these budgets will fail CI.

