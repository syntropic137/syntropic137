# All _handle_command() violations resolved - clean ratchet achieved.

[cross_context_public_api]
# Files that import from foreign contexts through internal paths (slices/, domain/, etc.)
# instead of through the public API (contexts.<ctx> or contexts.<ctx>.ports).
# Projection class imports (*Projection) are exempt (ADR-008 composition root pattern).
# path = { deep_imports = N, issue = "#NNN" }

# All cross-context violations resolved - clean ratchet achieved.

[projection_purity]
# Project-specific allowed import prefixes for projection files.
# Extends ESP's default PROJECTION_ALLOWED_PREFIXES (stdlib + event_sourcing).
# Adding a prefix here is a conscious decision - review before merging.
allowed_prefixes = [
    "syn_domain.contexts",
    "syn_shared",
    "syn_adapters.projection_stores",
    "time",
]

[in_memory_state]
# Registry of known in-memory state that must carry classification comments.
# Every entry here must have a CORRECTNESS/ACKNOWLEDGED/PERFORMANCE comment
# near the variable declaration in the source file.
# Format: path = { variable = "name", description = "what it is" }
"packages/syn-domain/src/syn_domain/contexts/github/slices/evaluate_webhook/EvaluateWebhookHandler.py" = { variable = "_fire_locks", description = "per-(trigger, pr) asyncio.Lock dict for concurrency guard" }
"packages/syn-domain/src/syn_domain/contexts/github/slices/evaluate_webhook/debouncer.py" = { variable = "_pending", description = "pending debounce task dict" }
"packages/syn-domain/src/syn_domain/contexts/github/slices/evaluate_webhook/safety_guards.py" = { variable = "_dispatch_timestamps", description = "dispatch rate limit timestamp list" }
"apps/syn-api/src/syn_api/routes/webhooks/signature.py" = { variable = "_sig_failures", description = "signature failure rate limiter dict" }

[aggregate_guards]
# @command_handler methods exempt from the guard requirement.
# Only for audit-only handlers that record observations without state transitions.
# path = { exempt_methods = ["method_name"], issue = "#NNN" }
"packages/syn-domain/src/syn_domain/contexts/github/domain/aggregate_trigger/TriggerRuleAggregate.py" = { exempt_methods = ["record_blocked", "record_dispatch_completed", "record_dispatch_failed"], issue = "#686" }

[error_propagation]
# path = { issue = "#NNN" }
"packages/syn-adapters/src/syn_adapters/workspace_backends/docker/docker_container_ops.py" = { issue = "#664" }

