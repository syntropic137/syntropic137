# AEF Dashboard UI - nginx configuration
# Handles SPA routing and API proxying

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_vary on;

    # Security headers (shared include — inherited by all locations)
    include /etc/nginx/conf.d/security-headers.conf;

    # API v1 proxy - forwards to dashboard backend
    # Version prefix lives here — FastAPI routes are unversioned.
    # To add v2: add location /api/v2/ pointing to a new backend.
    # CSP relaxed here: FastAPI Swagger UI loads JS/CSS from cdn.jsdelivr.net
    location /api/v1/ {
        proxy_pass http://dashboard:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Override the strict SPA CSP for the API — Swagger UI needs CDN access
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; connect-src 'self' wss: ws:; font-src 'self' https://cdn.jsdelivr.net; frame-ancestors 'self';" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
    }

    # WebSocket/SSE proxy for real-time updates
    location /api/v1/ws {
        proxy_pass http://dashboard:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;  # 24 hours for long-lived connections
    }

    # SSE endpoint for event streaming
    location /api/v1/stream {
        proxy_pass http://dashboard:8000/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        chunked_transfer_encoding off;
    }

    # Health check endpoint (for load balancers and Docker)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # SPA routing - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
