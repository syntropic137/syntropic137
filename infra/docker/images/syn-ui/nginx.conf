# AEF Dashboard UI - nginx configuration
# Handles SPA routing, API proxying, and optional basic auth.
#
# Two server blocks:
#   Port 80  — localhost access, NO auth (for local dev/testing/Playwright)
#   Port 8081 — tunnel access, basic auth required (when SYN_API_PASSWORD is set)
#
# Webhook endpoint bypasses auth on both ports (HMAC signature verified by app).
# docker-entrypoint.sh generates /tmp/nginx-auth/auth.conf at startup.

# ============================================================================
# PORT 80 — Localhost (no auth)
# ============================================================================
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_vary on;

    include /etc/nginx/conf.d/security-headers.conf;

    # --- Proxy locations (shared pattern) ---
    include /tmp/nginx-auth/locations.conf;
}

# ============================================================================
# PORT 8081 — Tunnel / external access (basic auth when configured)
# ============================================================================
server {
    listen 8081;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_vary on;

    include /etc/nginx/conf.d/security-headers.conf;

    # Basic auth (generated by entrypoint — "off" when no password set)
    include /tmp/nginx-auth/auth.conf;

    # --- Proxy locations (shared pattern) ---
    include /tmp/nginx-auth/locations.conf;
}
