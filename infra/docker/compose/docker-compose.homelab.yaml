# AEF Homelab Docker Compose Override
#
# Adds Cloudflare Tunnel for secure external access and production settings.
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.homelab.yaml up -d
#
# Or use the just recipe:
#   just homelab-up
#
# Prerequisites:
#   1. Configure CLOUDFLARE_TUNNEL_TOKEN in .env
#   2. Set AEF_DOMAIN in .env (e.g., aef.yourdomain.com)
#   3. Configure tunnel routes in Cloudflare Zero Trust dashboard

services:
  # ==========================================================================
  # CLOUDFLARE TUNNEL
  # ==========================================================================
  # Provides secure, zero-trust access without port forwarding
  # See: infra/cloudflare/README.md for setup instructions

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${COMPOSE_PROJECT_NAME:-aef}-cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      aef-ui:
        condition: service_healthy
      aef-dashboard:
        condition: service_healthy
    networks:
      - aef-internal

  # ==========================================================================
  # PRODUCTION OVERRIDES
  # ==========================================================================
  # These settings make services more resilient for always-on homelab use

  aef-dashboard:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  aef-ui:
    # Remove port exposure - access via Cloudflare Tunnel only
    ports: []
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  event-store:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  collector:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
