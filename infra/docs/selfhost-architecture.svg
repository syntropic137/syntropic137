<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8892b0"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64ffda"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4845f"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#ccd6f6" font-size="18" font-weight="bold">Syntropic137 (AEF) Self-Host Architecture</text>

  <!-- Legend -->
  <rect x="30" y="52" width="12" height="12" rx="2" fill="#4a7cf7" opacity="0.9"/>
  <text x="48" y="63" fill="#8892b0" font-size="11">Core Services</text>
  <rect x="160" y="52" width="12" height="12" rx="2" fill="#50c878" opacity="0.9"/>
  <text x="178" y="63" fill="#8892b0" font-size="11">Data Stores</text>
  <rect x="280" y="52" width="12" height="12" rx="2" fill="#f4845f" opacity="0.9"/>
  <text x="298" y="63" fill="#8892b0" font-size="11">External / Optional</text>
  <rect x="430" y="52" width="12" height="12" rx="2" fill="#9b59b6" opacity="0.9"/>
  <text x="448" y="63" fill="#8892b0" font-size="11">Dynamic Containers</text>

  <!-- Docker Network boundary -->
  <rect x="25" y="75" width="910" height="590" rx="12" fill="none" stroke="#2d3561" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="45" y="96" fill="#2d3561" font-size="12" font-weight="bold">syn-internal Docker network</text>

  <!-- ===== EXTERNAL ACCESS (top) ===== -->

  <!-- Browser -->
  <rect x="60" y="110" width="130" height="50" rx="8" fill="#16213e" stroke="#f4845f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="132" text-anchor="middle" fill="#f4845f" font-size="13" font-weight="bold">Browser</text>
  <text x="125" y="150" text-anchor="middle" fill="#8892b0" font-size="10">localhost:8008</text>

  <!-- GitHub -->
  <rect x="770" y="110" width="130" height="50" rx="8" fill="#16213e" stroke="#f4845f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="835" y="132" text-anchor="middle" fill="#f4845f" font-size="13" font-weight="bold">GitHub</text>
  <text x="835" y="150" text-anchor="middle" fill="#8892b0" font-size="10">Webhooks + API</text>

  <!-- Cloudflare Tunnel (optional) -->
  <rect x="370" y="110" width="210" height="50" rx="8" fill="#16213e" stroke="#f4845f" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="475" y="132" text-anchor="middle" fill="#f4845f" font-size="13" font-weight="bold">cloudflared</text>
  <text x="475" y="150" text-anchor="middle" fill="#8892b0" font-size="10">Cloudflare Tunnel (optional)</text>

  <!-- Arrow: Browser -> syn-ui -->
  <line x1="125" y1="160" x2="125" y2="200" stroke="#8892b0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Cloudflare -> syn-ui -->
  <line x1="475" y1="160" x2="320" y2="200" stroke="#8892b0" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Arrow: GitHub -> syn-ui (webhook) -->
  <path d="M 770 145 Q 550 145 400 215" fill="none" stroke="#f4845f" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="580" y="173" fill="#f4845f" font-size="9" transform="rotate(-8 580 173)">webhook POST</text>

  <!-- ===== FRONTEND TIER ===== -->

  <!-- syn-ui -->
  <rect x="55" y="205" width="310" height="65" rx="10" fill="#16213e" stroke="#4a7cf7" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="230" text-anchor="middle" fill="#4a7cf7" font-size="14" font-weight="bold">syn-ui</text>
  <text x="210" y="248" text-anchor="middle" fill="#8892b0" font-size="11">nginx reverse proxy + SPA frontend</text>
  <text x="210" y="262" text-anchor="middle" fill="#5a6a8a" font-size="10">:80 | Basic Auth | Rate Limiting</text>

  <!-- Arrow: syn-ui -> dashboard (API proxy) -->
  <line x1="210" y1="270" x2="210" y2="320" stroke="#4a7cf7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="298" fill="#5a6a8a" font-size="9">/api/v1/* proxy</text>

  <!-- Arrow: syn-ui -> dashboard (WebSocket) -->
  <line x1="300" y1="270" x2="350" y2="320" stroke="#64ffda" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="310" y="298" fill="#5a6a8a" font-size="9">/ws/* &amp; SSE</text>

  <!-- ===== APPLICATION TIER ===== -->

  <!-- Dashboard -->
  <rect x="80" y="325" width="360" height="75" rx="10" fill="#16213e" stroke="#4a7cf7" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="350" text-anchor="middle" fill="#4a7cf7" font-size="14" font-weight="bold">dashboard</text>
  <text x="260" y="368" text-anchor="middle" fill="#8892b0" font-size="11">FastAPI API Backend</text>
  <text x="260" y="385" text-anchor="middle" fill="#5a6a8a" font-size="10">:8000 | Workflow Engine | GitHub App | 1Password</text>

  <!-- Collector -->
  <rect x="530" y="325" width="200" height="75" rx="10" fill="#16213e" stroke="#4a7cf7" stroke-width="2" filter="url(#shadow)"/>
  <text x="630" y="350" text-anchor="middle" fill="#4a7cf7" font-size="14" font-weight="bold">collector</text>
  <text x="630" y="368" text-anchor="middle" fill="#8892b0" font-size="11">Event Ingestion API</text>
  <text x="630" y="385" text-anchor="middle" fill="#5a6a8a" font-size="10">:8080 | Batched writes</text>

  <!-- Arrow: Dashboard -> Collector (via workspace containers) -->
  <line x1="440" y1="362" x2="528" y2="362" stroke="#8892b0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== DATA TIER ===== -->

  <!-- TimescaleDB -->
  <rect x="40" y="470" width="200" height="70" rx="10" fill="#16213e" stroke="#50c878" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="495" text-anchor="middle" fill="#50c878" font-size="14" font-weight="bold">timescaledb</text>
  <text x="140" y="513" text-anchor="middle" fill="#8892b0" font-size="11">PostgreSQL + TimescaleDB</text>
  <text x="140" y="530" text-anchor="middle" fill="#5a6a8a" font-size="10">Events, Workflows, Projections</text>

  <!-- Event Store -->
  <rect x="270" y="470" width="200" height="70" rx="10" fill="#16213e" stroke="#50c878" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="495" text-anchor="middle" fill="#50c878" font-size="14" font-weight="bold">event-store</text>
  <text x="370" y="513" text-anchor="middle" fill="#8892b0" font-size="11">Rust gRPC Server</text>
  <text x="370" y="530" text-anchor="middle" fill="#5a6a8a" font-size="10">:50051 | Event Sourcing</text>

  <!-- Redis -->
  <rect x="500" y="470" width="180" height="70" rx="10" fill="#16213e" stroke="#50c878" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="495" text-anchor="middle" fill="#50c878" font-size="14" font-weight="bold">redis</text>
  <text x="590" y="513" text-anchor="middle" fill="#8892b0" font-size="11">Pub/Sub + Cache</text>
  <text x="590" y="530" text-anchor="middle" fill="#5a6a8a" font-size="10">:6379 | AOF persistence</text>

  <!-- MinIO -->
  <rect x="710" y="470" width="190" height="70" rx="10" fill="#16213e" stroke="#50c878" stroke-width="2" filter="url(#shadow)"/>
  <text x="805" y="495" text-anchor="middle" fill="#50c878" font-size="14" font-weight="bold">minio</text>
  <text x="805" y="513" text-anchor="middle" fill="#8892b0" font-size="11">S3-Compatible Storage</text>
  <text x="805" y="530" text-anchor="middle" fill="#5a6a8a" font-size="10">:9000 | Artifacts, Conversations</text>

  <!-- Arrows: Dashboard -> Data stores -->
  <line x1="180" y1="400" x2="140" y2="468" stroke="#50c878" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="260" y1="400" x2="370" y2="468" stroke="#50c878" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="340" y1="400" x2="590" y2="468" stroke="#50c878" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="380" y1="400" x2="805" y2="468" stroke="#50c878" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Arrow: Collector -> Event Store -->
  <line x1="630" y1="400" x2="420" y2="468" stroke="#50c878" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="540" y="438" fill="#5a6a8a" font-size="9" transform="rotate(15 540 438)">gRPC</text>

  <!-- Arrow: Event Store -> TimescaleDB -->
  <line x1="290" y1="505" x2="242" y2="505" stroke="#50c878" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== WORKSPACE CONTAINERS ===== -->

  <!-- Workspace container group -->
  <rect x="530" y="195" width="380" height="105" rx="10" fill="#16213e" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="720" y="218" text-anchor="middle" fill="#9b59b6" font-size="12" font-weight="bold">Workspace Containers (dynamic)</text>

  <!-- Workspace 1 -->
  <rect x="548" y="228" width="160" height="55" rx="6" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1"/>
  <text x="628" y="250" text-anchor="middle" fill="#9b59b6" font-size="11">workspace-abc123</text>
  <text x="628" y="268" text-anchor="middle" fill="#5a6a8a" font-size="9">Claude CLI | Git clone</text>

  <!-- Workspace 2 -->
  <rect x="725" y="228" width="160" height="55" rx="6" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1"/>
  <text x="805" y="250" text-anchor="middle" fill="#9b59b6" font-size="11">workspace-def456</text>
  <text x="805" y="268" text-anchor="middle" fill="#5a6a8a" font-size="9">Claude CLI | Git clone</text>

  <!-- Arrow: Dashboard -> Workspace (spawns via Docker socket) -->
  <path d="M 440 350 Q 500 300 545 265" fill="none" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="310" fill="#9b59b6" font-size="9">Docker socket</text>
  <text x="490" y="322" fill="#9b59b6" font-size="9">(spawn/monitor)</text>

  <!-- Arrow: Workspace -> Collector (JSONL events) -->
  <path d="M 628 283 Q 628 310 630 323" fill="none" stroke="#8892b0" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="640" y="308" fill="#5a6a8a" font-size="9">JSONL stdout</text>

  <!-- ===== VOLUMES (bottom) ===== -->
  <rect x="40" y="570" width="860" height="50" rx="8" fill="#0f0f23" stroke="#2d3561" stroke-width="1"/>
  <text x="480" y="592" text-anchor="middle" fill="#2d3561" font-size="12" font-weight="bold">Persistent Volumes</text>
  <text x="480" y="610" text-anchor="middle" fill="#3d4571" font-size="10">db_data | minio_data | redis_data | dashboard_logs | /workspaces (bind mount)</text>

  <!-- Docker Secrets label -->
  <rect x="40" y="630" width="860" height="30" rx="6" fill="#0f0f23" stroke="#2d3561" stroke-width="1"/>
  <text x="480" y="650" text-anchor="middle" fill="#3d4571" font-size="10">Docker Secrets: db-password.txt | redis-password.txt    |    Env Secrets: GitHub App keys, Agent tokens (via 1Password or .env)</text>
</svg>