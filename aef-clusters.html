const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");

let width = innerWidth;
let height = innerHeight;
let scale = 1;
let offsetX = width/2;
let offsetY = height/2;
let dragging = false;
let lastX, lastY;

function resize() {
    width = innerWidth;
    height = innerHeight;
    canvas.width = width;
    canvas.height = height;
    offsetX = width/2;
    offsetY = height/2;
    scale = Math.min(width, height) / 35;
    draw();
}
resize();

function toScreen(x, y) {
    return [offsetX + x * scale, offsetY + y * scale];
}

function draw() {
    ctx.fillStyle = "#0f1219";
    ctx.fillRect(0, 0, width, height);
    
    // Draw edges
    ctx.lineWidth = 2;
    data.edges.forEach(e => {
        const from = data.packages.find(p => p.id === e.from);
        const to = data.packages.find(p => p.id === e.to);
        if (from && to) {
            const [x1, y1] = toScreen(from.x, from.y);
            const [x2, y2] = toScreen(to.x, to.y);
            ctx.strokeStyle = `rgba(108, 92, 231, ${e.strength})`;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }
    });
    
    // Draw packages
    data.packages.forEach(p => {
        const [x, y] = toScreen(p.x, p.y);
        const r = p.size * scale * 0.15;
        
        // Glow
        const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
        grad.addColorStop(0, p.color + "40");
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r * 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Circle
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        
        // Border
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Label
        ctx.fillStyle = "#fff";
        ctx.font = "bold 12px SF Mono, Monaco, monospace";
        ctx.textAlign = "center";
        ctx.fillText(p.label, x, y + r + 18);
        
        // Module count
        ctx.fillStyle = "#888";
        ctx.font = "10px SF Mono, Monaco, monospace";
        ctx.fillText(p.moduleCount + " modules", x, y + r + 32);
    });
}

// Tooltip
canvas.onmousemove = e => {
    const mx = e.clientX;
    const my = e.clientY;
    let found = null;
    
    for (const p of data.packages) {
        const [x, y] = toScreen(p.x, p.y);
        const r = p.size * scale * 0.15;
        if (Math.hypot(mx - x, my - y) < r + 10) {
            found = p;
            break;
        }
    }
    
    if (found) {
        tooltip.style.display = "block";
        tooltip.style.left = mx + 15 + "px";
        tooltip.style.top = my + 15 + "px";
        tooltip.innerHTML = `
            <div style="font-weight:bold;color:#6c5ce7;margin-bottom:8px">${found.id}</div>
            <div>Modules: <b>${found.moduleCount}</b></div>
            <div>Total Cyclomatic: ${found.metrics.cyclomatic}</div>
            <div>Total Cognitive: ${found.metrics.cognitive}</div>
            <div>Total Functions: ${found.metrics.functions}</div>
            <div>Avg Health: ${(found.metrics.health * 100).toFixed(0)}%</div>
            <div style="margin-top:8px;border-top:1px solid rgba(255,255,255,0.1);padding-top:8px">
                ${found.modules.map(m => '<span class="module-chip">' + m + '</span>').join("")}
                ${found.moduleCount > 8 ? '<span class="module-chip">+' + (found.moduleCount - 8) + ' more</span>' : ''}
            </div>
        `;
    } else {
        tooltip.style.display = "none";
    }
};

// Pan
canvas.onmousedown = e => { dragging = true; lastX = e.clientX; lastY = e.clientY; };
canvas.onmouseup = () => dragging = false;
canvas.onmousemove = e => {
    if (dragging) {
        offsetX += e.clientX - lastX;
        offsetY += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        draw();
    }
};

// Zoom
canvas.onwheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale *= delta;
    draw();
};

window.onresize = resize;
</script>
