# Pre-commit hooks for code quality
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff for linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Local hooks
  - repo: local
    hooks:
      # POKA-YOKE: Prevent xfail/skip without issue links
      - id: test-debt-check
        name: Check for test debt (xfail/skip without issues)
        entry: python scripts/check_test_debt.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [commit]
        verbose: true
