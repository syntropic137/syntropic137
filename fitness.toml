# Architecture fitness thresholds — declarative rules evaluated by APSS (EXP-V1-0003).
# Replaces ci/fitness/code_quality/test_cognitive_complexity.py and test_file_size.py.
#
# Exceptions: fitness-exceptions.toml (every entry MUST reference a GitHub issue)

[config]
topology_dir = ".topology"
exceptions = "fitness-exceptions.toml"
severity_default = "error"

# ─── Cognitive Complexity ────────────────────────────────────────────────────

[[rules.threshold]]
id = "max-cognitive"
name = "Maximum Cognitive Complexity (function)"
source = "metrics/functions.json"
field = "metrics.cognitive"
max = 15
scope = "function"
severity = "error"
# Entity IDs: "python:module.path::func_name" / "rust:crate::path::func_name"
exclude = ["python:infra*", "python:scripts*", "rust:*", "python:ci*", "*conftest*", "python:lib.*", "tsx:lib/*", "typescript:lib/*"]

# ─── Cyclomatic Complexity ───────────────────────────────────────────────────

[[rules.threshold]]
id = "max-cyclomatic"
name = "Maximum Cyclomatic Complexity (function)"
source = "metrics/functions.json"
field = "metrics.cyclomatic"
max = 10
scope = "function"
severity = "error"
exclude = ["python:infra*", "python:scripts*", "rust:*", "python:ci*", "*conftest*", "python:lib.*", "tsx:lib/*", "typescript:lib/*"]

# ─── Lines of Code ───────────────────────────────────────────────────────────

[[rules.threshold]]
id = "max-loc-function"
name = "Maximum LOC (function)"
source = "metrics/functions.json"
field = "metrics.loc"
max = 100
scope = "function"
severity = "warning"
exclude = ["python:infra*", "python:scripts*", "rust:*", "python:ci*", "*conftest*", "python:lib.*", "tsx:lib/*", "typescript:lib/*"]

[[rules.threshold]]
id = "max-loc-file"
name = "Maximum LOC (file)"
source = "metrics/modules.json"
field = "metrics.lines_of_code"
max = 750
scope = "module"
severity = "error"
exclude = ["infra*", "scripts*", "lib*", "ci*", "*conftest*"]

# ─── Coupling ────────────────────────────────────────────────────────────────

[[rules.threshold]]
id = "max-fan-out"
name = "Maximum Fan-Out (efferent coupling)"
source = "metrics/modules.json"
field = "metrics.martin.ce"
max = 30
scope = "module"
severity = "error"
exclude = ["infra*", "scripts*", "lib*", "ci*", "*conftest*"]
