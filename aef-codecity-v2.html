<style>
*{box-sizing:border-box}
body{margin:0;font-family:'SF Mono',Monaco,monospace;background:#1a1a2e;overflow:hidden}
#info{position:absolute;top:10px;left:10px;padding:15px;background:rgba(20,20,40,0.95);color:#e0e0e0;border-radius:12px;z-index:100;max-width:320px}
#info h3{margin:0 0 10px;color:#00ff88;font-size:16px}
#info p{margin:5px 0;font-size:12px}
.legend{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1)}
.legend-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:11px}
.legend-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;flex:1}
.legend-bar div{flex:1}
.legend-labels{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:4px}
#districts{position:absolute;bottom:10px;left:10px;right:10px;padding:10px 15px;background:rgba(20,20,40,0.95);color:#e0e0e0;border-radius:12px;z-index:100;display:flex;gap:10px;flex-wrap:wrap;font-size:11px}
.district-label{padding:4px 10px;background:rgba(255,255,255,0.1);border-radius:6px;cursor:pointer;transition:all 0.2s}
.district-label:hover{background:rgba(0,255,136,0.3)}
#tooltip{position:absolute;padding:12px;background:rgba(10,10,20,0.98);color:#fff;border-radius:10px;display:none;z-index:1000;max-width:280px;font-size:12px;border:1px solid rgba(0,255,136,0.3)}
.health-bar{height:8px;border-radius:4px;background:#333;margin-top:6px;overflow:hidden}
.health-fill{height:100%;border-radius:4px}
</style></head>

  </div>
  <p style="color:#888;margin-top:12px;font-size:11px">Health = f(complexity/func, cognitive, LOC, coupling, size)</p>
</div>
<div id="districts"></div>
<div id="tooltip"></div>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(30, 25, 50);

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(30, 0, 5);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(50, 50, 30);
sun.castShadow = true;
scene.add(sun);

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 60),
    new THREE.MeshStandardMaterial({color: 0x151525})
);
ground.rotation.x = -Math.PI/2;
ground.position.set(50, -0.01, 10);
ground.receiveShadow = true;
scene.add(ground);

const buildingMeshes = [];
data.buildings.forEach(b => {
    const geo = new THREE.BoxGeometry(b.width, b.height, b.width);
    const mat = new THREE.MeshStandardMaterial({
        color: b.color,
        metalness: 0.3,
        roughness: 0.7
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(b.x, b.height/2, b.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = b;
    scene.add(mesh);
    buildingMeshes.push(mesh);
});

const districtDiv = document.getElementById("districts");
let xPos = 0;
data.districts.forEach(([name], idx) => {
    const label = document.createElement("div");
    label.className = "district-label";
    label.textContent = name;
    const targetX = idx * 14 + 5;
    label.onclick = () => {
        camera.position.set(targetX, 15, 20);
        controls.target.set(targetX, 0, 5);
    };
    districtDiv.appendChild(label);
});

const tooltip = document.getElementById("tooltip");
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getHealthColor(h) {
    if (h >= 80) return "#00ff88";
    if (h >= 65) return "#44dd77";
    if (h >= 50) return "#88cc55";
    if (h >= 35) return "#ddaa33";
    if (h >= 20) return "#ff7744";
    return "#ff3333";
}

renderer.domElement.onmousemove = e => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(buildingMeshes);
    if (hits.length) {
        const b = hits[0].object.userData;
        tooltip.style.display = "block";
        tooltip.style.left = e.clientX + 15 + "px";
        tooltip.style.top = e.clientY + 15 + "px";
        tooltip.innerHTML = `
            <div style="font-weight:bold;color:${b.color};margin-bottom:6px">${b.label}</div>
            <div>District: ${b.district}</div>
            <div>Cyclomatic: <b>${b.metrics.cyclomatic}</b></div>
            <div>Cognitive: ${b.metrics.cognitive}</div>
            <div>Functions: ${b.metrics.functions}</div>
            <div>Lines of Code: ${b.metrics.loc}</div>
            <div class="health-bar"><div class="health-fill" style="width:${b.metrics.health}%;background:${getHealthColor(b.metrics.health)}"></div></div>
            <div style="text-align:center;font-size:11px;margin-top:4px">Health: <b>${b.metrics.health}%</b></div>
            <div style="font-size:10px;color:#666;margin-top:8px">${b.id}</div>
        `;
    } else {
        tooltip.style.display = "none";
    }
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
};
</script>
