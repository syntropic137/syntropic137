let currentThreshold = 0.15;
let selectedNodeId = null;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f1a);
const camera = new THREE.PerspectiveCamera(75, (innerWidth-340)/innerHeight, 0.1, 1000);
camera.position.set(0, 10, 18);

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(innerWidth - 340, innerHeight);
renderer.domElement.style.position = "absolute";
renderer.domElement.style.left = "0";
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 0.8);
dl.position.set(5, 10, 7);
scene.add(dl);

const nodeMeshes = [];
const edgeMeshes = [];
const nodeMap = {};

allData.nodes.forEach(n => {
    const g = new THREE.SphereGeometry(n.size * 0.35, 24, 24);
    const m = new THREE.MeshPhongMaterial({color: n.color, emissive: n.color, emissiveIntensity: 0.3});
    const mesh = new THREE.Mesh(g, m);
    mesh.position.set(...n.position);
    mesh.userData = n;
    scene.add(mesh);
    nodeMeshes.push(mesh);
    nodeMap[n.id] = mesh;
});

function rebuildEdges() {
    edgeMeshes.forEach(m => scene.remove(m));
    edgeMeshes.length = 0;
    let visCount = 0;
    
    allData.edges.forEach(e => {
        if (e.strength < currentThreshold) return;
        const f = allData.nodes.find(n => n.id === e.from);
        const t = allData.nodes.find(n => n.id === e.to);
        if (f && t) {
            const path = new THREE.LineCurve3(new THREE.Vector3(...f.position), new THREE.Vector3(...t.position));
            const tube = new THREE.TubeGeometry(path, 1, Math.max(0.02, e.strength * 0.06), 6, false);
            const opacity = 0.3 + e.strength * 0.5;
            const mat = new THREE.MeshBasicMaterial({color: e.color, transparent: true, opacity: opacity});
            const mesh = new THREE.Mesh(tube, mat);
            scene.add(mesh);
            edgeMeshes.push(mesh);
            visCount++;
        }
    });
    document.getElementById("visible-edges").textContent = visCount;
}
rebuildEdges();

document.getElementById("threshold").oninput = e => {
    currentThreshold = parseFloat(e.target.value);
    document.getElementById("threshold-val").textContent = currentThreshold.toFixed(2);
    rebuildEdges();
};

function renderModuleList() {
    const sortBy = document.getElementById("sort-by").value;
    const list = document.getElementById("module-list");
    
    let sorted = [...allData.nodes];
    switch(sortBy) {
        case "name": sorted.sort((a,b) => a.label.localeCompare(b.label)); break;
        case "coupling": sorted.sort((a,b) => b.coupling - a.coupling); break;
        case "cyclomatic": sorted.sort((a,b) => b.metrics.cyclomatic - a.metrics.cyclomatic); break;
        case "cognitive": sorted.sort((a,b) => b.metrics.cognitive - a.metrics.cognitive); break;
        case "functions": sorted.sort((a,b) => b.metrics.function_count - a.metrics.function_count); break;
        case "instability": sorted.sort((a,b) => b.metrics.instability - a.metrics.instability); break;
    }
    
    const getValue = n => {
        switch(sortBy) {
            case "coupling": return n.coupling.toFixed(1);
            case "cyclomatic": return n.metrics.cyclomatic;
            case "cognitive": return n.metrics.cognitive;
            case "functions": return n.metrics.function_count;
            case "instability": return (n.metrics.instability * 100).toFixed(0) + "%";
            default: return n.coupling.toFixed(1);
        }
    };
    
    list.innerHTML = sorted.map(n => `
        <div class="module-item ${n.id === selectedNodeId ? 'selected' : ''}" data-id="${n.id}">
            <div class="health-dot" style="background:${n.color}"></div>
            <div class="module-name" title="${n.id}">${n.label}</div>
            <div class="module-value">${getValue(n)}</div>
        </div>
    `).join("");
    
    list.querySelectorAll(".module-item").forEach(el => {
        el.onclick = () => {
            selectedNodeId = el.dataset.id;
            const mesh = nodeMap[selectedNodeId];
            if (mesh) {
                camera.position.set(mesh.position.x + 5, mesh.position.y + 3, mesh.position.z + 8);
                controls.target.copy(mesh.position);
            }
            renderModuleList();
        };
    });
}
document.getElementById("sort-by").onchange = renderModuleList;
renderModuleList();

const tooltip = document.getElementById("tooltip");
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.onmousemove = e => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const h = ray.intersectObjects(nodeMeshes);
    if (h.length) {
        const n = h[0].object.userData;
        tooltip.style.display = "block";
        tooltip.style.left = e.clientX + 15 + "px";
        tooltip.style.top = e.clientY + 15 + "px";
        tooltip.innerHTML = `
            <div style="font-weight:bold;color:#ff6b9d;margin-bottom:6px">${n.label}</div>
            <div>Coupling Score: <b>${n.coupling}</b></div>
            <div>CC: ${n.metrics.cyclomatic} | Cog: ${n.metrics.cognitive}</div>
            <div>Functions: ${n.metrics.function_count}</div>
            <div>Instability: ${(n.metrics.instability * 100).toFixed(0)}%</div>
            <div style="font-size:10px;color:#666;margin-top:6px">${n.id}</div>
        `;
    } else {
        tooltip.style.display = "none";
    }
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = (innerWidth - 340) / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth - 340, innerHeight);
};
</script>
</body></html>
