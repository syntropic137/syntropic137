name: RFC (Request for Comments)
description: Propose a significant design change or new subsystem
labels: ["rfc"]
body:
  - type: markdown
    attributes:
      value: |
        RFCs are for larger changes that benefit from community input before implementation.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph overview of what you're proposing.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What use cases does it enable?
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: Proposed Design
      description: |
        How would this work? Include:
        - Key components and their responsibilities
        - API surface or CLI changes
        - Event/aggregate changes (if touching the domain)
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: Trade-offs and Alternatives
      description: What are the downsides? What alternatives were considered?
    validations:
      required: false

  - type: textarea
    id: open-questions
    attributes:
      label: Open Questions
      description: What needs further discussion or input?
    validations:
      required: false
