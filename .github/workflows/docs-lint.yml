name: Docs Lint

# Runs on all PRs and pushes to main/release.
on:
  pull_request:
  push:
    branches: [main, release]

jobs:
  lint-content:
    name: Lint docs content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check typography
        run: |
          FOUND=$(grep -rl $'\xe2\x80\x94' apps/syn-docs/content/ 2>/dev/null || true)
          if [[ -n "$FOUND" ]]; then
            echo "::error::Typography issue found in syn-docs content. Use colons or commas instead."
            grep -rn $'\xe2\x80\x94' apps/syn-docs/content/ 2>/dev/null || true
            exit 1
          fi
          echo "Typography check passed. ✓"
