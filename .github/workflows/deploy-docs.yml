# =============================================================================
# Deploy Docs — Build and deploy docs.syntropic137.com via Vercel CLI
# =============================================================================
#
# Release-only — not on PRs to avoid slowing trunk-based development.
# Must succeed before considering a release complete.
#
# Manual dispatch available for hotfixes or preview deploys.
#
# See ADR-052 for rationale and setup instructions.
# =============================================================================

name: Deploy Docs

on:
  release:
    types: [published]
  workflow_dispatch:

# ISS-259: Least-privilege default
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy docs.syntropic137.com
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Setup uv (for CLI docs generation)
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: apps/syn-docs
        run: pnpm install --frozen-lockfile

      - name: Generate docs (CLI + OpenAPI)
        working-directory: apps/syn-docs
        run: pnpm run generate

      - name: Build
        working-directory: apps/syn-docs
        run: pnpm run build

      - name: Deploy to Vercel
        working-directory: apps/syn-docs
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
