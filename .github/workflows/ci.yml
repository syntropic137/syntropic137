name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
  workflow_dispatch:
  schedule:
    # Run integration tests weekly on Sunday at 2am UTC
    - cron: '0 2 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ISS-259: Least-privilege default — jobs that need write access (e.g. publishing)
# must explicitly declare it. Prevents a compromised step from pushing code or
# modifying releases without an obvious diff in the workflow file.
permissions:
  contents: read

jobs:
  #############################################################################
  # PYTHON QA - Fast checks (lint, format, typecheck)
  #############################################################################

  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    steps:
      # ISS-259: Pinned to commit SHA instead of mutable tag (@v4).
      # A tag can be silently repointed to a malicious commit (XZ-style attack).
      # SHA pins mean any change requires an explicit diff in this file.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup VSA CLI
        uses: ./.github/actions/setup-vsa

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Validate domain events
        run: uv run python scripts/validate_domain_events.py

      - name: VSA validation
        run: vsa validate

      # POKA-YOKE: Fail if xfail/skip without issue links
      - name: Check test debt
        run: uv run python scripts/check_test_debt.py

  #############################################################################
  # ARCHITECTURAL FITNESS - Structural invariant enforcement
  #############################################################################

  architectural-fitness:
    name: Architectural Fitness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      # ISS-259: @stable is a branch, not a tag — especially important to pin.
      # dtolnay/rust-toolchain moves stable forward continuously; a supply chain
      # compromise here would execute arbitrary code during Rust toolchain setup.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: Code quality thresholds (APSS)
        run: just fitness-check

      - name: Structural & ES invariants
        run: just fitness-invariants

      - name: Topology validation
        run: just topology-check

  #############################################################################
  # PYTHON UNIT TESTS - Fast, runs on every push
  #############################################################################

  python-unit-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        env:
          TERM: dumb
          NO_COLOR: "1"
          COLUMNS: "200"
        run: |
          uv run pytest -m unit \
            --cov=apps/syn-cli/src \
            --cov=apps/syn-api/src \
            --cov=packages/syn-domain/src \
            --cov=packages/syn-adapters/src \
            --cov=packages/syn-shared/src \
            --cov-report=term-missing \
            -x -q

  #############################################################################
  # PYTHON INTEGRATION TESTS - Requires database services
  # Runs on: weekly schedule, pushes to main, and workflow_dispatch
  # Skipped on: feature branch PRs (for fast iteration)
  #############################################################################

  python-integration-tests:
    name: Python Integration Tests
    runs-on: ubuntu-latest
    # Run on: weekly cron, main branch pushes, manual dispatch
    # Skip on: feature branch PRs (unit tests are sufficient for fast iteration)
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: syn
          POSTGRES_PASSWORD: syn_dev_password
          POSTGRES_DB: syn
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # TODO(#62): Enable EventStore service when container is published
      # eventstore:
      #   image: ghcr.io/syntropic137/event-store:latest
      #   ports:
      #     - 55051:50051
      #   options: >-
      #     --health-cmd "grpc_health_probe -addr=:50051"
      #     --health-interval 10s
      #     --health-timeout 5s
      #     --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        env:
          TERM: dumb
          NO_COLOR: "1"
          COLUMNS: "200"
          # Point tests to CI services (test_infrastructure fixture auto-detects)
          TEST_TIMESCALEDB_HOST: localhost
          TEST_TIMESCALEDB_PORT: "15432"
          TEST_EVENTSTORE_HOST: localhost
          TEST_EVENTSTORE_PORT: "55051"
        run: |
          uv run pytest -m integration -x -q

  #############################################################################
  # DASHBOARD UI - TypeScript checks
  #############################################################################

  dashboard-ui:
    name: Dashboard UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/syn-dashboard-ui/package-lock.json

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9

      # ISS-259: --ignore-scripts prevents postinstall hooks from executing
      # arbitrary code during npm install — a common npm supply chain vector.
      - name: Install ui-feedback-react dependencies
        working-directory: lib/ui-feedback/packages/ui-feedback-react
        run: pnpm install --ignore-scripts

      - name: Install dashboard dependencies
        working-directory: apps/syn-dashboard-ui
        run: npm ci

      - name: Link ui-feedback-react
        working-directory: apps/syn-dashboard-ui
        run: npm link ../../lib/ui-feedback/packages/ui-feedback-react

      - name: Lint
        working-directory: apps/syn-dashboard-ui
        run: npm run lint

      - name: Build
        working-directory: apps/syn-dashboard-ui
        run: npm run build

  #############################################################################
  # DOCS SITE - Fumadocs build check
  #############################################################################

  docs-site:
    name: Docs Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: apps/syn-docs
        run: pnpm install

      - name: Build
        working-directory: apps/syn-docs
        run: pnpm run build

  #############################################################################
  # SUBMODULE VALIDATION - Ensure submodules are properly referenced
  #############################################################################

  submodule-check:
    name: Submodule Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true

      - name: Verify submodules
        run: |
          echo "Checking submodule status..."
          git submodule status

          # Verify submodules are initialized
          if [ ! -f "lib/agentic-primitives/README.md" ]; then
            echo "❌ agentic-primitives submodule not initialized"
            exit 1
          fi

          if [ ! -f "lib/event-sourcing-platform/README.md" ]; then
            echo "❌ event-sourcing-platform submodule not initialized"
            exit 1
          fi

          echo "✅ All submodules properly initialized"

  #############################################################################
  # OSV VULNERABILITY SCAN - Supply chain security (ISS-259)
  #
  # Google's OSV Scanner checks all lock files against the OSV database
  # (covers CVEs, GitHub Security Advisories, and ecosystem-specific DBs).
  # Scans both Python (uv.lock) and all npm/pnpm lock files in one step.
  #
  # Rollout: currently in warn mode (continue-on-error: true) to establish
  # a clean baseline. Once zero findings confirmed, remove continue-on-error
  # to enforce blocking. See TODO(#259).
  #############################################################################

  osv-scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v1.9.0
        continue-on-error: true  # TODO(#259): remove after first clean baseline run
        with:
          scan-args: |-
            --lockfile=uv.lock
            --lockfile=apps/syn-dashboard-ui/package-lock.json
            --lockfile=apps/syn-pulse-ui/pnpm-lock.yaml
            --lockfile=packages/openclaw-plugin/package-lock.json

  #############################################################################
  # SUMMARY - Required status check for PRs
  #############################################################################

  ci-success:
    name: CI Success
    if: always()
    needs:
      - python-qa
      - architectural-fitness
      - python-unit-tests
      - python-integration-tests
      - dashboard-ui
      - docs-site
      - submodule-check
      - osv-scan
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          # Check for failures (integration tests are optional on non-PR)
          if [[ "${{ needs.python-qa.result }}" == "failure" ]] || \
             [[ "${{ needs.architectural-fitness.result }}" == "failure" ]] || \
             [[ "${{ needs.python-unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.dashboard-ui.result }}" == "failure" ]] || \
             [[ "${{ needs.docs-site.result }}" == "failure" ]] || \
             [[ "${{ needs.submodule-check.result }}" == "failure" ]]; then
            echo "❌ CI checks failed"
            exit 1
          fi

          # Integration tests only required on PRs
          if [[ "${{ github.event_name }}" == "pull_request" ]] && \
             [[ "${{ needs.python-integration-tests.result }}" == "failure" ]]; then
            echo "❌ Integration tests failed"
            exit 1
          fi

          # Check for cancellations
          if [[ "${{ needs.python-qa.result }}" == "cancelled" ]] || \
             [[ "${{ needs.architectural-fitness.result }}" == "cancelled" ]] || \
             [[ "${{ needs.python-unit-tests.result }}" == "cancelled" ]] || \
             [[ "${{ needs.dashboard-ui.result }}" == "cancelled" ]] || \
             [[ "${{ needs.docs-site.result }}" == "cancelled" ]]; then
            echo "⚠️ CI checks were cancelled"
            exit 1
          fi

          echo "✅ All CI checks passed!"

      - name: Write summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python QA | ${{ needs.python-qa.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architectural Fitness | ${{ needs.architectural-fitness.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Unit Tests | ${{ needs.python-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Integration Tests | ${{ needs.python-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard UI | ${{ needs.dashboard-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Submodule Check | ${{ needs.submodule-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV Scan | ${{ needs.osv-scan.result }} |" >> $GITHUB_STEP_SUMMARY
