name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #############################################################################
  # PYTHON QA - Fast checks (lint, format, typecheck)
  #############################################################################

  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy apps packages

      - name: Validate domain events
        run: uv run python scripts/validate_domain_events.py

  #############################################################################
  # PYTHON UNIT TESTS - Fast, runs on every push
  #############################################################################

  python-unit-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        env:
          TERM: dumb
          NO_COLOR: "1"
          COLUMNS: "200"
        run: |
          uv run pytest -m unit \
            --cov=apps/aef-cli/src \
            --cov=apps/aef-dashboard/src \
            --cov=packages/aef-domain/src \
            --cov=packages/aef-adapters/src \
            --cov=packages/aef-shared/src \
            --cov-report=term-missing \
            -x -q

  #############################################################################
  # PYTHON INTEGRATION TESTS - Requires database services
  # TODO: Add TimescaleDB and EventStore services when ready for full integration testing
  # For now, integration tests should be run locally with: docker compose up && pytest -m integration
  #############################################################################

  python-integration-tests:
    name: Python Integration Tests
    runs-on: ubuntu-latest
    # Disabled until we add database services to CI
    # Integration tests require TimescaleDB (port 5433) and EventStore (port 50051)
    if: false # github.event_name == 'pull_request'

    # TODO: Uncomment when ready to enable integration tests in CI
    # services:
    #   timescaledb:
    #     image: timescale/timescaledb:latest-pg15
    #     env:
    #       POSTGRES_USER: aef
    #       POSTGRES_PASSWORD: aef_dev_password
    #       POSTGRES_DB: aef_observability
    #     ports:
    #       - 5433:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #
    #   eventstore:
    #     image: ghcr.io/agentparadise/event-store:latest
    #     ports:
    #       - 50051:50051
    #     options: >-
    #       --health-cmd "grpc_health_probe -addr=:50051"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        env:
          TERM: dumb
          NO_COLOR: "1"
          COLUMNS: "200"
        run: |
          uv run pytest -m integration -x -q

  #############################################################################
  # DASHBOARD UI - TypeScript checks
  #############################################################################

  dashboard-ui:
    name: Dashboard UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/aef-dashboard-ui/package-lock.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install ui-feedback-react dependencies
        working-directory: lib/ui-feedback/packages/ui-feedback-react
        run: pnpm install --ignore-scripts

      - name: Install dashboard dependencies
        working-directory: apps/aef-dashboard-ui
        run: npm ci

      - name: Link ui-feedback-react
        working-directory: apps/aef-dashboard-ui
        run: npm link ../../lib/ui-feedback/packages/ui-feedback-react

      - name: Lint
        working-directory: apps/aef-dashboard-ui
        run: npm run lint

      - name: Build
        working-directory: apps/aef-dashboard-ui
        run: npm run build

  #############################################################################
  # SUBMODULE VALIDATION - Ensure submodules are properly referenced
  #############################################################################

  submodule-check:
    name: Submodule Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Verify submodules
        run: |
          echo "Checking submodule status..."
          git submodule status

          # Verify submodules are initialized
          if [ ! -f "lib/agentic-primitives/README.md" ]; then
            echo "❌ agentic-primitives submodule not initialized"
            exit 1
          fi

          if [ ! -f "lib/event-sourcing-platform/README.md" ]; then
            echo "❌ event-sourcing-platform submodule not initialized"
            exit 1
          fi

          echo "✅ All submodules properly initialized"

  #############################################################################
  # SUMMARY - Required status check for PRs
  #############################################################################

  ci-success:
    name: CI Success
    if: always()
    needs:
      - python-qa
      - python-unit-tests
      - python-integration-tests
      - dashboard-ui
      - submodule-check
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          # Check for failures (integration tests are optional on non-PR)
          if [[ "${{ needs.python-qa.result }}" == "failure" ]] || \
             [[ "${{ needs.python-unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.dashboard-ui.result }}" == "failure" ]] || \
             [[ "${{ needs.submodule-check.result }}" == "failure" ]]; then
            echo "❌ CI checks failed"
            exit 1
          fi

          # Integration tests only required on PRs
          if [[ "${{ github.event_name }}" == "pull_request" ]] && \
             [[ "${{ needs.python-integration-tests.result }}" == "failure" ]]; then
            echo "❌ Integration tests failed"
            exit 1
          fi

          # Check for cancellations
          if [[ "${{ needs.python-qa.result }}" == "cancelled" ]] || \
             [[ "${{ needs.python-unit-tests.result }}" == "cancelled" ]] || \
             [[ "${{ needs.dashboard-ui.result }}" == "cancelled" ]] || \
             [[ "${{ needs.submodule-check.result }}" == "cancelled" ]]; then
            echo "⚠️ CI checks were cancelled"
            exit 1
          fi

          echo "✅ All CI checks passed!"

      - name: Write summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python QA | ${{ needs.python-qa.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Unit Tests | ${{ needs.python-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Integration Tests | ${{ needs.python-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard UI | ${{ needs.dashboard-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Submodule Check | ${{ needs.submodule-check.result }} |" >> $GITHUB_STEP_SUMMARY
