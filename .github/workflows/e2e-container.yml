name: E2E Container Execution

on:
  push:
    branches: [main]
    paths:
      - "packages/aef-agent-runner/**"
      - "packages/aef-adapters/src/aef_adapters/workspaces/**"
      - "packages/aef-domain/src/aef_domain/contexts/workflows/**"
      - "docker/workspace/**"
      - ".github/workflows/e2e-container.yml"
  pull_request:
    paths:
      - "packages/aef-agent-runner/**"
      - "packages/aef-adapters/src/aef_adapters/workspaces/**"
      - "packages/aef-domain/src/aef_domain/contexts/workflows/**"
      - "docker/workspace/**"
      - ".github/workflows/e2e-container.yml"
  workflow_dispatch:
    inputs:
      run_full_e2e:
        description: "Run full E2E with live API calls (requires secrets)"
        type: boolean
        default: false

concurrency:
  group: e2e-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #############################################################################
  # F17 TESTS - All container execution robustness tests in one job
  # Target: <2 minutes
  #############################################################################

  f17-tests:
    name: F17 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      APP_ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      # Run all F17 tests in a single pytest call for speed
      - name: Run F17 unit tests
        run: |
          uv run pytest \
            packages/aef-shared/tests/test_workspace_paths.py \
            packages/aef-domain/tests/contexts/workflows/cleanup/test_stale_cleaner.py \
            packages/aef-domain/tests/contexts/workflows/execute_workflow/test_container_execution.py \
            packages/aef-adapters/tests/workspaces/test_artifact_collection.py \
            packages/aef-adapters/tests/workspaces/test_attribution_settings.py \
            -q --tb=short

      # Agent runner tests need package install, run separately
      - name: Run analytics streamer tests
        run: |
          uv run --package aef-agent-runner pytest \
            packages/aef-agent-runner/tests/test_analytics_streamer.py \
            -q --tb=short

  #############################################################################
  # DOCKER BUILD - Validate workspace image (runs in parallel)
  # Target: <3 minutes with cache
  #############################################################################

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workspace image
        uses: docker/build-push-action@v5
        with:
          context: docker/workspace
          push: false
          tags: aef-workspace:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify image
        run: |
          docker run --rm aef-workspace:latest python --version
          docker run --rm aef-workspace:latest python -c "import aef_agent_runner; print('OK')" || true

  #############################################################################
  # E2E CONTAINER TEST - Full integration (manual trigger only)
  #############################################################################

  e2e-container:
    name: E2E Container Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [f17-tests, docker-build]
    if: github.event.inputs.run_full_e2e == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install & Run E2E
        run: |
          uv sync --all-extras
          docker build -t aef-workspace:latest docker/workspace/
          uv run python scripts/e2e_agent_in_container_test.py
        continue-on-error: true

  #############################################################################
  # SUMMARY
  #############################################################################

  e2e-success:
    name: E2E Success
    if: always()
    needs: [f17-tests, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check jobs
        run: |
          if [[ "${{ needs.f17-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            exit 1
          fi
          echo "✅ All E2E checks passed!"
