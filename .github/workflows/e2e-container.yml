name: E2E Container Execution

on:
  push:
    branches: [main]
    paths:
      - "packages/syn-adapters/src/syn_adapters/workspaces/**"
      - "packages/syn-domain/src/syn_domain/contexts/workflows/**"
      - "lib/agentic-primitives/providers/workspaces/**" # ADR-029: workspace images
      - "lib/agentic-primitives/primitives/**" # ADR-029: hooks
      - ".github/workflows/e2e-container.yml"
  pull_request:
    paths:
      - "packages/syn-adapters/src/syn_adapters/workspaces/**"
      - "packages/syn-domain/src/syn_domain/contexts/workflows/**"
      - "lib/agentic-primitives/providers/workspaces/**" # ADR-029: workspace images
      - "lib/agentic-primitives/primitives/**" # ADR-029: hooks
      - ".github/workflows/e2e-container.yml"
  workflow_dispatch:
    inputs:
      run_full_e2e:
        description: "Run full E2E with live API calls (requires secrets)"
        type: boolean
        default: false

concurrency:
  group: e2e-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #############################################################################
  # DOCKER BUILD - Validate workspace image (runs in parallel)
  # Target: <3 minutes with cache
  #############################################################################

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python for build script
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build workspace image via build-provider.py
        working-directory: lib/agentic-primitives
        run: |
          uv run scripts/build-provider.py claude-cli --tag agentic-workspace-claude-cli:latest

      - name: Verify image
        run: |
          # Use --entrypoint to bypass node base image entrypoint
          docker run --rm --entrypoint python3 agentic-workspace-claude-cli:latest --version
          docker run --rm --entrypoint claude agentic-workspace-claude-cli:latest --version || echo "Claude CLI check (optional)"

  #############################################################################
  # E2E CONTAINER TEST - Full integration (manual trigger only)
  #############################################################################

  e2e-container:
    name: E2E Container Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build]
    if: github.event.inputs.run_full_e2e == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install & Run E2E
        run: |
          uv sync --all-extras
          # Build workspace image via build-provider.py (stages required context)
          cd lib/agentic-primitives && uv run scripts/build-provider.py claude-cli --tag agentic-workspace-claude-cli:latest && cd ../..
          uv run python scripts/e2e_agent_in_container_test.py
        continue-on-error: true

  #############################################################################
  # SUMMARY
  #############################################################################

  e2e-success:
    name: E2E Success
    if: always()
    needs: [docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check jobs
        run: |
          if [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            exit 1
          fi
          echo "✅ Docker build passed!"
