# =============================================================================
# Release Create — Orchestrates the full release pipeline
# =============================================================================
#
# Trigger: Push to the `release` branch (via merged PR from main).
#
# Pipeline:
#   1. Read version from pyproject.toml, create git tag + GitHub Release
#   2. Call release-containers.yaml (build, sign, push Docker images)
#   3. Call release-cli.yaml (build, test, publish @syntropic137/cli to npm)
#
# The existing release workflows are called as reusable workflows. They run
# exactly the same code as when triggered by release.published or dispatch.
#
# Note: GITHUB_TOKEN-created events don't trigger other workflows (GitHub's
# loop prevention). That's why we call the workflows directly instead of
# relying on the release.published event.
# =============================================================================

name: Release

on:
  push:
    branches: [release]

concurrency:
  group: release-create
  cancel-in-progress: false  # Never cancel an in-progress release

# Permissions must cover everything the reusable workflows need.
# The caller's permissions cap what callees can request.
permissions:
  contents: write       # Create tag + release + release-assets upload
  pull-requests: read   # Read merged PR metadata for release notes
  packages: write       # Push Docker images to GHCR
  id-token: write       # cosign signing + npm provenance (Sigstore OIDC)
  security-events: write # Upload SARIF results from container scans

jobs:
  # ---------------------------------------------------------------------------
  # Step 1: Create GitHub Release + tag
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.create.outputs.created }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Release version: $TAG"

      - name: Check release does not already exist
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "::warning::Release ${{ steps.version.outputs.version }} already exists — skipping creation"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get merged PR release notes
        if: steps.check.outputs.created == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recently merged PR targeting release
          PR_NUM=$(gh pr list --state merged --base release --limit 1 \
            --json number --jq '.[0].number')

          if [[ -n "$PR_NUM" ]]; then
            echo "Found merged PR #$PR_NUM"
            # Write PR body to a file to avoid shell escaping issues
            gh pr view "$PR_NUM" --json body --jq '.body' > /tmp/release-notes.md
          else
            echo "No merged PR found — using default notes"
            echo "Release ${{ steps.version.outputs.version }}" > /tmp/release-notes.md
          fi

      - name: Create tag and release
        id: create
        if: steps.check.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.sha }}" \
            $PRERELEASE_FLAG

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created release: ${{ steps.version.outputs.version }}"

  # ---------------------------------------------------------------------------
  # Step 2: Build, sign, push Docker images + attach release assets
  # ---------------------------------------------------------------------------
  release-containers:
    name: Containers
    needs: [create-release]
    if: needs.create-release.outputs.created == 'true'
    uses: ./.github/workflows/release-containers.yaml
    with:
      version: ${{ needs.create-release.outputs.version }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Step 3: Build, test, publish CLI to npm
  # ---------------------------------------------------------------------------
  release-cli:
    name: CLI
    needs: [create-release]
    if: needs.create-release.outputs.created == 'true'
    uses: ./.github/workflows/release-cli.yaml
    with:
      version: ${{ needs.create-release.outputs.version }}
    secrets: inherit
