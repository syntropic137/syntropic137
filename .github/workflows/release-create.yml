# =============================================================================
# Release Create — Orchestrates the full release pipeline
# =============================================================================
#
# Trigger: Push to the `release` branch (via merged PR from main).
#
# Pipeline:
#   1. Read version from pyproject.toml, create git tag + GitHub Release
#   2. Call release-containers.yaml (build, sign, push Docker images)
#   3. Call release-cli.yaml (build, test, publish @syntropic137/cli to npm)
#
# The existing release workflows are called as reusable workflows. They run
# exactly the same code as when triggered by release.published or dispatch.
#
# Note: GITHUB_TOKEN-created events don't trigger other workflows (GitHub's
# loop prevention). That's why we call the workflows directly instead of
# relying on the release.published event.
# =============================================================================

name: Release

on:
  push:
    branches: [release]

concurrency:
  group: release-create
  cancel-in-progress: false  # Never cancel an in-progress release

# Permissions must cover everything the reusable workflows need.
# The caller's permissions cap what callees can request.
permissions:
  contents: write       # Create tag + release + release-assets upload
  pull-requests: read   # Read merged PR metadata for release notes
  packages: write       # Push Docker images to GHCR
  id-token: write       # cosign signing + npm provenance (Sigstore OIDC)
  security-events: write # Upload SARIF results from container scans

jobs:
  # ---------------------------------------------------------------------------
  # Step 1: Create GitHub Release + tag
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    environment: release-publish  # Requires manual approval before release
    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.check.outputs.created }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Release version: $TAG"

      - name: Check release does not already exist
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "::warning::Release ${{ steps.version.outputs.version }} already exists — skipping creation"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get merged PR release notes
        if: steps.check.outputs.created == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recently merged PR targeting release
          PR_NUM=$(gh pr list --state merged --base release --limit 1 \
            --json number --jq '.[0].number // empty')

          if [[ -n "$PR_NUM" && "$PR_NUM" != "null" ]]; then
            echo "Found merged PR #$PR_NUM"
            # Write PR body to a file to avoid shell escaping issues
            gh pr view "$PR_NUM" --json body --jq '.body' > /tmp/release-notes.md
          else
            echo "No merged PR found — using default notes"
            echo "Release ${{ steps.version.outputs.version }}" > /tmp/release-notes.md
          fi

      - name: Create tag and release
        id: create
        if: steps.check.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.sha }}" \
            $PRERELEASE_FLAG

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created release: ${{ steps.version.outputs.version }}"

  # ---------------------------------------------------------------------------
  # Step 2: Pre-publish validation — verify API/CLI/docs pipeline is in sync
  # ---------------------------------------------------------------------------
  pre-publish-validation:
    name: Pre-Publish Validation
    needs: [create-release]
    if: needs.create-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        run: |
          pnpm --filter @syntropic137/cli install --frozen-lockfile
          pnpm --filter syn-docs install --frozen-lockfile

      - name: Regenerate OpenAPI spec
        run: uv run python scripts/extract_openapi.py

      - name: Verify CLI types match OpenAPI spec
        run: pnpm --filter @syntropic137/cli run check:api-drift

      - name: Verify generated CLI types are current
        run: |
          pnpm --filter @syntropic137/cli generate:types
          CHANGED=$(git diff --name-only apps/syn-cli-node/src/generated/)
          UNTRACKED=$(git ls-files --others --exclude-standard apps/syn-cli-node/src/generated/)
          if [[ -n "$CHANGED" || -n "$UNTRACKED" ]]; then
            echo "::error::CLI types are stale — aborting release."
            [[ -n "$CHANGED" ]] && echo "Modified:" && echo "$CHANGED"
            [[ -n "$UNTRACKED" ]] && echo "Untracked:" && echo "$UNTRACKED"
            exit 1
          fi
          echo "CLI types are in sync."

      - name: Verify CLI docs are current
        run: |
          pnpm --filter @syntropic137/cli generate:docs
          CHANGED=$(git diff --name-only apps/syn-docs/content/docs/cli/)
          UNTRACKED=$(git ls-files --others --exclude-standard apps/syn-docs/content/docs/cli/)
          if [[ -n "$CHANGED" || -n "$UNTRACKED" ]]; then
            echo "::error::CLI docs are stale — aborting release."
            [[ -n "$CHANGED" ]] && echo "Modified:" && echo "$CHANGED"
            [[ -n "$UNTRACKED" ]] && echo "Untracked:" && echo "$UNTRACKED"
            exit 1
          fi
          echo "CLI docs are in sync."

      - name: Verify API docs are current
        run: |
          cd apps/syn-docs && pnpm run generate:openapi
          cd ../..
          CHANGED=$(git diff --name-only apps/syn-docs/openapi.json apps/syn-docs/content/docs/api/)
          UNTRACKED=$(git ls-files --others --exclude-standard apps/syn-docs/content/docs/api/)
          if [[ -n "$CHANGED" || -n "$UNTRACKED" ]]; then
            echo "::error::API docs are stale — aborting release."
            [[ -n "$CHANGED" ]] && echo "Modified:" && echo "$CHANGED"
            [[ -n "$UNTRACKED" ]] && echo "Untracked:" && echo "$UNTRACKED"
            exit 1
          fi
          echo "API docs are in sync."

  # ---------------------------------------------------------------------------
  # Step 3: Build, sign, push Docker images + attach release assets
  # ---------------------------------------------------------------------------
  release-containers:
    name: Containers
    needs: [create-release, pre-publish-validation]
    if: needs.create-release.outputs.created == 'true'
    uses: ./.github/workflows/release-containers.yaml
    with:
      version: ${{ needs.create-release.outputs.version }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Step 4: Build, test, publish CLI to npm
  # ---------------------------------------------------------------------------
  release-cli:
    name: CLI
    needs: [create-release, pre-publish-validation]
    if: needs.create-release.outputs.created == 'true'
    uses: ./.github/workflows/release-cli.yaml
    with:
      version: ${{ needs.create-release.outputs.version }}
    secrets: inherit
