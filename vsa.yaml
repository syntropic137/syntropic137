# VSA Configuration for Agentic Engineering Framework
# See: https://github.com/neuralempowerment/event-sourcing-platform/vsa for documentation

version: 1
root: ./packages/aef-domain/src/aef_domain/contexts
language: python

# Event sourcing framework integration
framework:
  name: event-sourcing-platform
  base_types:
    domain_event:
      import: "event_sourcing"
      class: "DomainEvent"
    aggregate:
      import: "event_sourcing"
      class: "AggregateRoot"
    command_handler:
      import: "event_sourcing"
      class: "CommandHandler"

# Validation rules
validation:
  require_tests: true
  require_integration_events_in_shared: true
  max_nesting_depth: 3
  allow_nested_features: true

# Pattern definitions (Python conventions)
patterns:
  command: "*Command"
  event: "*Event"
  handler: "*Handler"
  query: "*Query"
  integration_event: "*IntegrationEvent"
  test: "test_*"

# Domain layer configuration (for manifest --include-domain)
domain:
  path: domain
  aggregates:
    path: "."
    pattern: "**/*Aggregate.*"
  commands:
    path: "commands"
    pattern: "**/*Command.*"
  events:
    path: "events"
    pattern: "**/*Event.*"
  queries:
    path: "queries"
    pattern: "**/*Query.*"

# Context-specific configuration
contexts:
  workflows:
    description: "Workflow definitions, phases, and execution lifecycle"
  agents:
    description: "Agent sessions, token tracking, and execution metrics"
  artifacts:
    description: "Artifact storage, metadata, and retrieval"
  workspaces:
    description: "Isolated workspace lifecycle, performance metrics, and observability"
  github:
    description: "GitHub App integration, installation tokens, and secure credential management"
  costs:
    description: "Session and execution cost tracking with real-time aggregation"

# Architecture diagram configuration
diagram:
  title: "AEF Architecture"
  subtitle: "Event-sourced orchestration platform"
  
  # Show feature details in context boxes
  show_feature_details: true
  max_features_per_context: 5
  
  # Applications layer (top)
  applications:
    - "AEF CLI"
    - "Dashboard API"
    - "Dashboard UI"
  
  # Infrastructure layer (bottom)
  infrastructure:
    - name: "TimescaleDB"
      description: "Projections"
    - name: "EventStore"
      description: "Events"
    - name: "Redis"
      description: "Cache"
    - name: "MinIO"
      description: "Artifacts"
  
  # Package ecosystem (sidebar)
  packages:
    - "aef-domain"
    - "aef-adapters"
    - "aef-collector"
    - "aef-shared"
  
  # Libraries (sidebar)
  libraries:
    - name: "agentic-primitives"
      repo: "github.com/neuralempowerment/agentic-primitives"
    - name: "event-sourcing-platform"
      repo: "github.com/neuralempowerment/event-sourcing-platform"
