# VSA Configuration for Syntropic137
# See: https://github.com/neuralempowerment/event-sourcing-platform/vsa for documentation

version: 1
root: ./packages/syn-domain/src/syn_domain/contexts
language: python

# Event sourcing framework integration
framework:
  name: event-sourcing-platform
  base_types:
    domain_event:
      import: "event_sourcing"
      class: "DomainEvent"
    aggregate:
      import: "event_sourcing"
      class: "AggregateRoot"
    command_handler:
      import: "event_sourcing"
      class: "CommandHandler"

# Validation rules
validation:
  require_tests: true
  require_integration_events_in_shared: true
  max_nesting_depth: 3
  allow_nested_features: true
  # Shared read-model projections consumed by sibling slices (not cross-slice violations)
  exclude_from_isolation:
    - "list_repos"
    - "list_systems"
  # Commands live at domain/commands/ with handlers in slices/ (DDD convention per ADR-020)
  domain_level_commands: true

# Pattern definitions (Python conventions)
patterns:
  command: "*Command"
  event: "*Event"
  handler: "*Handler"
  query: "*Query"
  integration_event: "*IntegrationEvent"
  test: "test_*"

# Domain layer configuration (for manifest --include-domain)
domain:
  path: domain
  aggregates:
    path: "."
    pattern: "**/*Aggregate.*"
  commands:
    path: "commands"
    pattern: "**/*Command.*"
  events:
    path: "events"
    pattern: "**/*Event.*"
  queries:
    path: "queries"
    pattern: "**/*Query.*"

# Context-specific configuration
# NOTE: Reorganized per ADR-020 bounded-context-aggregate-relationship
contexts:
  orchestration:
    description: "Workflow execution and workspace management (merged from workflows + workspaces)"
  agent_sessions:
    description: "Agent sessions, token tracking, and execution metrics"
  artifacts:
    description: "Artifact storage, metadata, and retrieval"
  github:
    description: "GitHub App integration, installation tokens, and secure credential management"
  organization:
    description: "Organization, system, and repo management"
  # DEPRECATED: These contexts are being phased out (see ADR-020)
  # workflows:
  #   description: "DEPRECATED - Use orchestration"
  # workspaces:
  #   description: "DEPRECATED - Use orchestration"
  # costs:
  #   description: "DEPRECATED - projections moved to orchestration/agent_sessions"
  # metrics:
  #   description: "DEPRECATED - projections moved to orchestration"
  # observability:
  #   description: "DEPRECATED - projections moved to agent_sessions"
